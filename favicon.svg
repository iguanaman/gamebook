<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left page -->
  <rect x="4" y="6" width="11" height="20" rx="1" fill="#8B5E3C"/>
  <!-- Right page -->
  <rect x="17" y="6" width="11" height="20" rx="1" fill="#A0703A"/>
  <!-- Spine -->
  <rect x="14" y="5" width="4" height="22" rx="1" fill="#5C3D1E"/>
  <!-- Left page lines -->
  <line x1="7" y1="12" x2="13" y2="12" stroke="#F5E6C8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="13" y2="16" stroke="#F5E6C8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="20" x2="13" y2="20" stroke="#F5E6C8" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right page lines -->
  <line x1="19" y1="12" x2="25" y2="12" stroke="#F5E6C8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="25" y2="16" stroke="#F5E6C8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="20" x2="25" y2="20" stroke="#F5E6C8" stroke-width="1.2" stroke-linecap="round"/>
</svg>
