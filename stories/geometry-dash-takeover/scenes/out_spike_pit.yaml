id: out_spike_pit
text:
- |-
  The podium clicks. Like a seatbelt unbuckling.
- male_young_american_forthright: |-
    Ohhh. Not quite. Step aside.
- |-
  No floor. NO FLOOR.
- |-
  I drop, screaming, into a spike pit. FOOMP. Foam. The spikes are RUBBER. Bounce, roll, OUT mat.
- |-
  Mara's already there, drawstring in her mouth.
- female_young_american_youthful_sweet: |-
    Told you it was rigged.
- |-
  It wasn't. I just blanked on ForeverBound. I want to evaporate.
- male_young_american_forthright: |-
    Bad luck, young geometrician. Juice box on your way out.
- |-
  I'm out.
choices: []
