id: out_wave_washout
text:
- The sluice gate YAWNS open before I'm done saying the word.
- A wave of glowing pink liquid SHOOMPS me off my feet. Tube. Fast. Banking corners.
  Screaming my entire face off.
- WHOOSH SPLASH.
- OUT LAGOON. Foam beads. Wet socks. Why are my socks wet, this was supposed to be
  FOAM.
- Up on the bleachers Sage is shaking her head a tiny bit. Master Emblem. MASTER EMBLEM.
  I knew it. I KNEW it.
- male_young_american_forthright: '[sigh] So close, young geometrician. So close.
    Take a long bow. The room earned it.'
- That's the worst one. The "so close" one.
- I'm out.
