id: out_wind_tunnel
text:
- The podium HISSES. So much worse than a click.
- male_young_american_forthright: Ohhh. Not the update I had in mind. Step aside.
- A vent ROARS. I'm a kite. I'm a kid-shaped paper airplane, sideways through a tube
  into the foam pit.
- Brennan's already in there going "I MEANT 1.7" into a beanbag. He didn't.
- male_young_american_forthright: Bad luck, young geometrician. Juice box on your
    way out.
- Mara waves with her drawstring still in her mouth. She does not look upset.
- I'm out.
choices: []
