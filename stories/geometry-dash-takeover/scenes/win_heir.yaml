id: win_heir
text:
- |-
  THE MASTER EMBLEM. THE MASTER EMBLEM. IT'S THE EMBLEM!
- male_young_american_forthright: |-
    Correct.
- |-
  Sluice gate behind Dex. WHOOSH. He's GONE — wave tube, hair finally not a perfect spike, last thing I see is his face going: bruh.
- |-
  The whole room goes cyan. Magenta confetti. The walls dissolve into glowing levels.
- |-
  RobTop pushes his glasses up his nose one last time. He's holding a key. Cube-shaped, on a cyan ribbon.
- male_young_american_forthright: |-
    Young geometrician. The studio is yours.
- |-
  I'm crying. Full-on crying.
- |-
  The key is WARM. Up on the bleachers Mara claps. Brennan's tablet finally has my face on it. Milo's grinning. Sage gives me one slow nod. Dex — soaked — actually claps. Open-mouth this time.
- male_young_american_forthright: |-
    The HQ has its ways, my heir. Take care of them. They are very, very good at being flung. [chuckle]
- |-
  He winks. RobTop just WINKED at me.
- |-
  I am the new RobTop.
- |-
  I am the NEW. ROBTOP.
journal: |-
  You inherited RobTop's studio. The keys, the HQ, the spikes (which are foam), the wave tubes (which are wet). The Master Emblem. You knew it.
