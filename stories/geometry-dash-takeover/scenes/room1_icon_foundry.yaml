id: room1_icon_foundry
text:
- |-
  The conveyor dumps us in a factory. Robot arms stamping cube icons. Sparks. The floor is a grate. Spikes underneath. Lowkey gonna throw up.
- |-
  Six podiums slide up. We climb on.
- male_young_american_forthright: |-
    Room one. Who composed Stereo Madness — the very first level of the very first build?
- female_young_american_youthful_sweet: |-
    BOOM KITTY! Easy! Boom—
- |-
  Mara's already shouting. She didn't even let him finish.
- |-
  I think. Stereo Madness. Level one. The OG track. Who actually MADE that song.
