id: act1/records_approach
text:
- The city records office is a converted warehouse on Marsh Street — fluorescent lights,
  the smell of old paper, filing cabinets going back to before the war. A clerk at
  the front desk looks up when Frank comes in and looks back down again.
- The files Frank needs are technically public record. He has every right.
- He asks for the Aldwick parcel boundary revisions, last eighteen months.
- The clerk checks a ledger. Checks it again.
- Checked out. Three weeks ago. Not returned.
choices:
- text: Ask who checked them out
  next: act1/records_who_checked
- text: Come back tonight — if the files are checked out, someone's hiding them, not
    using them
  next: act1/beat3_exit
- text: Charm the clerk — maybe there's a duplicate set, a working copy
  next: act1/records_charm
