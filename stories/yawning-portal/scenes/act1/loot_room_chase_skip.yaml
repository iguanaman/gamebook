text:
  - "You turn back to the trunk. He took the main journal — whatever it was, it's gone with him.
    What's left is the wrapping: an old inkcloth with a name inked on the inside corner in a
    different hand than Linnet's."
  - "*Calder, Dock 14.* An address, or a name, or both."
  - "Probably nothing. You fold it into your coat anyway."

