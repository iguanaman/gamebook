id: act1/walked_on_job_ending
text:
- The night air off Waterdeep Harbour is cold and smells of brine and tallow. The
  gas-lamps on Altair Street throw orange pools on the cobbles, each one separate,
  nothing between them.
- Somewhere under that tavern floor a girl called Linnet is waiting for someone to
  come down. She will wait a while longer.
- You came up the High Road looking for work. You found some, and passed on it. That
  is its own kind of story. Just not the one you came here to tell.
- Winter is coming in off the sea. The city goes on without you.
