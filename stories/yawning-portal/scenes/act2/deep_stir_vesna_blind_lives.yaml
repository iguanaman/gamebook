text:
  - "She is blind for the length of the climb — you guide her hand-over-hand up the rope, Linnet just below, the sound from the well getting quieter as you ascend."
  - "At the top, Vesna blinks. Once. Twice. The white fades."
  - female_adult_american_gentle_tender_sweet: "Lady Luck willing — [sigh] — there it is. There's the light."
  - "She means it. She is genuinely grateful for the light."

