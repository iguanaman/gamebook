text:
- |-
  First strike is yours. Pip drops through the hatch silently, lands on something soft that doesn't make a sound for half a second, and the half-second is enough.
- |-
  A scorching ray from you through the hatch opening. A hiss, a thump.
- |-
  Then it's a fight — close, fast, tight. But they're already short a chief and you have the momentum.
choices:
- text: |-
    Korsa plates the hatch — the rest fight clean behind him
  next:
  - scene: act2/cellar_win_korsa_plate
    weight: 6
  - scene: act2/cellar_win_korsa_plate_bloodied
    weight: 3
  - scene: act2/cellar_korsa_dies
    weight: 1
  requires:
    flags:
    - recruited_korsa
    flags_unset:
