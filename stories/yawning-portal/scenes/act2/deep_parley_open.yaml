text:
- You lower the steel. Not far. But enough.
- The thing in the pool watches. Its face — the thing that reads as a face — does
  not change.
- male_midlife_american_deep_malevolent_ancient_slow: You are not the first to come
    for the one who answered. You are the first to pause.
- A beat of silence, metronomic.
- male_midlife_american_deep_malevolent_ancient_slow: We are encouraged.
- Linnet is still on the far side of the pool. She is looking at you now. Her expression
  is complex in a way you don't have language for — relief and something that might
  be guilt and something that is definitely not relief.
- female_young_american_sweet_youthful_clear: It won't — it doesn't hurt people. Not
    like that.
- She says it like she has been rehearsing it.
- female_young_american_sweet_youthful_clear: People?
- if:
    flags:
    - recruited_vesna
    flags_unset:
    - vesna_died
  text:
  - female_adult_american_gentle_tender_sweet: We are listening to it. Do you understand
      what we are doing? We are *listening* to it.
  - She is saying it to you, specifically.
- if:
    flags:
    - recruited_thessaly
    flags_unset:
    - thessaly_died
  text:
  - Thessaly is the stillest thing in the room.
  - female_adult_american_sultry_villainous: Ask it what it wants her for. Don't ask
      it what it wants — ask what it wants *her* for. Specifically.
choices:
- text: Listen to the terms in full
  next: act2/deep_parley_terms
  requires:
    flags_unset:
    - parley_terms_heard
  effects:
    flags:
      parley_terms_heard: true
- text: Take the deal — the apprentice walks out marked
  next: act2/deep_parley_accept
  requires:
    flags:
    - parley_terms_heard
- text: Take the deal — and ask for more
  next: act2/deep_parley_accept_greedy
  requires:
    flags:
    - parley_terms_heard
    stats:
      Wits: 7
- text: Refuse — steel out instead
  next: act2/deep_fight_open
  effects:
    flags:
      parley_refused: true
      vesna_relieved: true
