text:
- if:
    flags:
    - recruited_korsa
    flags_unset:
    - korsa_died
    - recruited_vesna
    - recruited_pip
    - recruited_thessaly
  text:
  - It's a straight fight and you almost win it cleanly. Almost. A bone-wight finds
    the gap below Korsa's helm at the end — the end, when the fight was already over
    in every way except this one. He goes down kneeling, axe in hand.
  - The wight dies a half-second later. You make sure of that.
  - journal: Korsa died at the end of the cellar fight, when it was almost over.
- if:
    flags:
    - recruited_pip
    flags_unset:
    - pip_died
  text:
  - You're winning. You're winning when the chief catches Pip on the wrong side of
    a pivot — she was moving fast and it had been doing the same. The sound she makes
    is short. The chief gets your blade immediately after, which is no comfort.
  - journal: Pip died in the cellar — the chief was faster than it had any right to
      be.
- if:
    flags:
    - recruited_vesna
    flags_unset:
    - vesna_died
    - vesna_left
  text:
  - Vesna takes a blade through the body from the side — a goblin, the one nobody
    was watching because it was the smallest one. She goes down slowly, prayer-coin
    in her hand, and she doesn't lose her grip on it.
  - journal: Vesna fell in the cellar. A goblin, the smallest one. She had the coin
      in her hand.
- if:
    flags:
    - recruited_thessaly
    flags_unset:
    - thessaly_died
  text:
  - Thessaly takes a claw to the side, below the ribs, and keeps fighting for fifteen
    more seconds before her legs tell her the fight is over. She's on the floor looking
    at the ceiling when you reach her.
  - journal: Thessaly fell in the cellar. She kept fighting for fifteen seconds after
      she should have stopped.
choices:
- text: Through the far door.
  next: act2/deep_chamber_enter
  effects:
    flags:
      weapon_taken_from_cellar_pack: true
      cellar_resolved: true
    stats:
      Vigor: -3
