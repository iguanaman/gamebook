text:
- |-
  Wicker Lane runs between a tallow-chandler and a dyer's yard, and it smells like both. Gas-lamps throw orange ovals on the cobblestones. A doorway at the far end — the witness's lodging, according to Pip's fence — has a young Watch officer planted in it like a nail.
- |-
  He sees you coming. His hand finds his truncheon before his brain gets the order.
- if:
    flags:
    - knows_alley_protector
  text: |-
    The fence named the man who paid for this doorstep. A coin in the officer's pocket, keeping his eyes open and his conscience looking the other way.
choices:
- text: |-
    Bluff him — you're with the chandler's accountant, tallying the night's wax
  next: act2/alley_witness_room
  requires:
    stats:
      Wits: 5
  effects:
    flags:
      alley_bluffed_watchman: true
- text: |-
    Bribe him — three coin, nothing said
  next: act2/alley_witness_room
  requires:
    stats:
      Coin: 3
    flags_unset:
    - alley_bribed_watchman
  effects:
    flags:
      alley_bribed_watchman: true
    stats:
      Coin: -3
- text: |-
    Pip — up the chandler's roof, in through the skylight
  next: act2/alley_witness_room
  requires:
    flags:
    - recruited_pip
    flags_unset:
    - pip_died
    - pip_left
  hide_if_failed: true
  effects:
    flags:
      alley_entered_roof: true
      pip_led_entry: true
- text: |-
    Hoist Vesna up to the side window — she'll unlatch from inside
  next: act2/alley_witness_room
  requires:
    flags:
    - recruited_vesna
    flags_unset:
    - vesna_died
    - vesna_left
  hide_if_failed: true
  effects:
    flags:
      alley_entered_window: true
- text: |-
    Through the front. Korsa first.
  next: act2/alley_brawl_open
  requires:
    flags:
    - recruited_korsa
    flags_unset:
    - korsa_died
    - korsa_left
  hide_if_failed: true
  effects:
    flags:
      alley_kicked_door: true
- text: |-
    Wait in the shadows — let the toughs come out to you
  next: act2/alley_brawl_open
  effects:
    flags:
      alley_ambushed_first: true
