text:
- |-
  You win. The kuo-toa die, the dock-coat man breaks and runs. You win.
- |-
  But the deck is slick and the harbour is right there, and somewhere in the middle of the fight one of your companions found the rail with their back instead of the hull.
- |-
  You are at the rail. They are not in the water. They are already under it.
- |-
  The page is in the hold. You retrieve it with hands that are not quite steady.
choices:
- text: |-
    Climb out — Korsa is gone
  next: act2/harbour_resolution
  requires:
    flags:
    - recruited_korsa
    flags_unset:
    - korsa_died
    - korsa_left
    - recruited_pip
    - recruited_vesna
    - recruited_thessaly
  hide_if_failed: true
  effects:
    flags:
      korsa_died: true
      met_the_thing_below_glimpse: true
      found_journal: true
      found_journal_waterlogged: true
    stats:
      Vigor: -3
