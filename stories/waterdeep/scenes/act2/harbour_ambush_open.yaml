text:
- if:
    flags:
    - found_journal
  text: |-
    The apprentice's journal said something about bulging eyes, the gill-slits, the way they moved in shallow water — wrong, she'd written, wrong like a thing pretending to know how legs work. You know what you're looking at before the first one clears the hatch.
  else: |-
    They come up from the hold in a rush — not charging, not exactly, more like water finding a level. Three of them. Two are kuo-toa, pale and slick, each eye a separate milky lamp. The third was a man once, still wearing a dock-worker's coat.
- if:
    flags:
    - harbour_descended_hold
  text: |-
    You're below-decks when they come, which means there's no sky above you and no rail at your back — just hull and beam and the stink of bilge and the slap of wet feet on planking.
  else: |-
    They clear the hatch one after another and the deck immediately gets slicker — they trail water the way a river trail mud, and the deck was already greasy with algae.
- if:
    flags:
    - harbour_warned
  text: |-
    You're ready. It's still bad.
  else: |-
    You are not ready. They are faster than they look.
- |-
  A kuo-toa hurls itself at your lead companion with both arms, mouth open, teeth too many. The deck lurches as the tide shifts the hull. The harbour is three feet past the rail.
choices:
