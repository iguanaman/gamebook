id: act1/peltz_warm

text:
  - |-
    I tell Peltz I've never seen a filing system that made sense in my life, and the city's looks about average. He laughs before he can stop himself — a short, unhappy sound — and his shoulders drop an inch.
  - male_young_american_weak: |-
      Look, I probably shouldn't — I mean, I don't know anything official. Ray and I weren't even that close. He just, the last week he was here, he was different. Ate his lunch alone every day. That thing he did sometimes, taking files to a side desk — he did that and didn't put everything back.
  - |-
    He's watching the corridor. Not me.

choices:
  - text: |-
      Ask what Ray was looking at
    next: act1/peltz_files_hint
    effects:
      stats:
        evidence: 1

  - text: |-
      Let it go — Peltz has said enough, pushing will spook him
    next: act1/legwork_hub
