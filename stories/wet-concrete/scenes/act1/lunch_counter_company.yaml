id: act1/lunch_counter_company
text:
- female_young_american_sweet_youthful_clear: One time. Two days before — before he
    stopped coming. A man sat down across from him. Didn't order anything, which you
    notice, because what do you do while someone's eating if you're not eating? Just
    sat there with his hat down. They talked — not long. Then Ray paid and left. Just
    left, didn't finish his pie. He always finished his pie.
- She smooths the counter again. Working something out.
- female_young_american_sweet_youthful_clear: The other man left right after. Didn't
    even look at the menu.
choices:
- text: Ask her to describe the suited man
