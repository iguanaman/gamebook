id: act1/aldwick_hector_badge

text:
  - |-
    Frank takes the card out slowly — no production in it, just sets it on the railing.
  - |-
    Hector looks at it. His expression doesn't change, but something in his shoulders does.
  - male_elder_american_wise_approachable: |-
      [sigh] Used to know cops by their block. You'd see them at the hardware store on Saturday. That was before.
  - |-
    He picks up the card, reads it, sets it back.
  - male_elder_american_wise_approachable: |-
      If you're asking about the surveys, I'll tell you the same thing I told Ray Doss the last time he was here. Which is the same thing I'd have told anyone who stopped long enough to ask. The boundaries keep moving on paper, east side mostly. Every correction goes the same direction. And there's a woman on Callum Street who's been writing it all down — Marta Gaines. She's the one you want.
  - |-
    He looks at the survey crew. Not at Frank.
  - male_elder_american_wise_approachable: |-
      Ray wrote it down too. Difference is Ray had a job at the office where the papers live.

choices:
  - text: |-
      Get Marta's address
    next: act1/aldwick_hector_detail
    effects:
      stats:
        evidence: 1
