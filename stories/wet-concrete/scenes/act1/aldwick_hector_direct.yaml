id: act1/aldwick_hector_direct

text:
  - male_elder_american_wise_approachable: |-
      Ray Doss.
  - |-
    He says the name the way you repeat something back to check you heard it right.
  - male_elder_american_wise_approachable: |-
      He was the one who stopped. The others — city surveyors, three of them over the past year — they come, they write, they leave. What they write, nobody knows. Ray was the one who came back on his own time and actually looked at the buildings. Measured things that didn't need measuring. Asked what my grandfather paid for this lot.
  - |-
    He looks at Frank steadily.
  - male_elder_american_wise_approachable: |-
      The others just confirmed what they were sent to confirm. That's what they say, anyway.

choices:
  - text: |-
      Ask what they were confirming
    next: act1/aldwick_hector_detail
    effects:
      stats:
        evidence: 1

  - text: |-
      Thank him and move on — you've got what you need
    next: act1/aldwick_parcel_check
