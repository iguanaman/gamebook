id: act1/aldwick_marta_intro

journal: |-
  You found Marta Gaines. She had been waiting for someone to come.

text:
  - |-
    The address is a narrow house on Callum Street with a front window that faces the block. Marta Gaines opens the door herself.
  - |-
    Mid-forties. She looks at Frank the way someone looks at a lockpick — it might be useful, or it might be in the wrong hands. She doesn't step back to let him in.
  - female_midlife_african-american_casual_opinionated: |-
      You're not city. City comes in pairs and they always have clipboards. What do you want?
  - if: {flags: [aldwick_visited]}
    text: |-
      She glances past him, down the street, before her eyes come back.

choices:
  - text: |-
      Tell her about Ray — what he found, what happened to him
    next: act1/aldwick_marta_ray

  - text: |-
      Ask what she knows about the boundary changes — let her lead
    next: act1/aldwick_marta_lead

  - text: |-
      Wait — let her size you up before you say anything
    next: act1/aldwick_marta_wait
    requires:
      stats:
        rep: 4
    failed_text: |-
      *(She'd read the hesitation as calculation, not patience.)*
    effects:
      stats:
        rep: 1
