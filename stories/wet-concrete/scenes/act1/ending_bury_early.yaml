id: act1/ending_bury_early

text:
  - |-
    The city doesn't notice when a man stops asking questions. That's the thing about Harmon City — it never needed Frank Doyle, and it's not going to miss him.
  - |-
    Ray Doss, city surveyor. Vera Doss. The boundaries that moved east through Aldwick, one correction at a time, until seventeen parcels belonged to someone else.
  - |-
    Somewhere in the city, a man signs a form. Another man files it. The machine runs.
  - |-
    Frank Doyle knew what he was looking at. He'll spend a long time not thinking about that.

