id: act1/records_room_success
text:
- The cabinet opens. Third drawer, brown folder, thicker than it has any right to
  be for a routine filing.
- Aldwick parcel numbers. Revised boundary lines, each one annotated with a date.
  Every line has an authorising signature — two of them, same pair every time. The
  surveying supervisor's name Frank recognises. The second name he doesn't — not yet.
  A city deputy, from the office header.
- Frank photographs as many pages as he can before the janitor's footsteps change
  direction. He puts the folder back the way he found it and goes the way he came
  in.
- He was in for four minutes.
choices:
- text: Get out — you have what you came for and you've already been here too long
  next: act1/beat3_exit
  effects:
    stats:
      evidence: 1
