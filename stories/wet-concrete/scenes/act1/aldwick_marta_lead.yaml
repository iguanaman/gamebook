id: act1/aldwick_marta_lead

text:
  - |-
    She thinks about it for a moment, then moves back from the door and gestures at the kitchen table.
  - |-
    The notebook is open. Columns of parcel numbers, dates, names of authorising officials. Neat handwriting, blue ink. Seventeen entries.
  - female_midlife_african-american_casual_opinionated: |-
      Seventeen parcels in eighteen months. All on the east side. Every "correction" moves the boundary the same direction — toward the rail corridor. Toward where they say the highway on-ramp is going. Now, a highway on-ramp needs land. Land in Harmon City costs money. Unless you already own it on paper, which someone does, and the surveys say you're right.
  - |-
    She taps the notebook without handing it over.
  - female_midlife_african-american_casual_opinionated: |-
      Ray Doss was the first city employee who looked at this and didn't laugh.

choices:
  - text: |-
      Ask what Ray said when he saw the notebook
