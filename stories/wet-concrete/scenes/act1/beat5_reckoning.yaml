id: act1/beat5_reckoning

text:
  - |-
    Ray Doss, city surveyor. He found something in the survey records — boundaries being moved, parcels being re-titled, signatures being forged. He tried to do something about it. Then he disappeared.
  - |-
    Vera Doss. She hired Frank to find her husband. She found what Ray hid in the house. She called Frank. Now she's dead.
  - |-
    The police wrote a report and lost interest. They will continue to lose interest because the men who killed Vera Doss have the police.
  - |-
    Frank Doyle sits with that for a moment. He doesn't have a client anymore. He doesn't have an obligation. The city has told him, in the clearest possible language, to stop.
  - |-
    He can. It's a real option. He didn't make this. He didn't know Vera Doss six days ago.
  - |-
    The question is whether that matters.

choices:
  - text: |-
      Walk away — you don't have a client, you don't have an obligation, and the city is telling you clearly to stop
    next: act1/walk_away_ending

  - text: |-
      Stay in — Vera paid for the truth, and she's paid more than the retainer now
    next: act1/act2_entry_standard

  - text: |-
      Stay in — you were a cop once. You know what happens to cases that nobody pushes
    next: act1/act2_entry_standard

  - text: |-
      Stay in — whoever killed Vera made this personal
    next: act1/act2_entry_standard
