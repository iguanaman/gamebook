id: act1/beat5_entry

text:
  - |-
    Back in the office. The desk. The ashtray. The window that faces the alley and tells him nothing new.
  - |-
    He puts what he has on the desk and looks at it. A parcel number. A neighbourhood. A forged signature, or a missing file, or both. A dead woman's last words.
  - |-
    The shape of the thing has been clear since Aldwick — municipal, deliberate, protected. What isn't clear is what Frank Doyle is supposed to do with that.
  - if: {flags: [aldwick_visited]}
    text: |-
      He's already been to Aldwick. He already knows what the boundaries mean, and what moving them means for the people who live there. That part isn't abstract.

choices:
  - text: |-
      Go over everything — what does it add up to?
    next: act1/beat5_reckoning
