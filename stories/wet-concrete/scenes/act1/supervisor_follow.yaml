id: act1/supervisor_follow

text:
  - |-
    I follow him out the back, down the stairwell, onto the side street. He walks two blocks without checking behind him — a man who doesn't think he needs to. Then he does check. Left shoulder, half a second. He's done it before.
  - |-
    The pay phone on the corner of Bleecker and Ninth. He feeds two coins, dials without consulting anything written down. The call lasts under a minute. I can't hear it through the glass.
  - |-
    What I can read is the number card on the phone housing. KL5-2209. Whether it's the booth he always uses or the first one he reached, I can't say. But a man who checks his shoulder before he dials has reasons for the call he's making.

choices:
  - text: |-
      Write down the phone number on the booth — may be useful later
    next: act1/legwork_hub
    effects:
      stats:
        evidence: 1

  - text: |-
      Don't push it — you've already been seen once today
    next: act1/legwork_hub
