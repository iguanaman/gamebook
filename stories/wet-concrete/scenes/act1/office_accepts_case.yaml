id: act1/office_accepts_case

text:
  - |-
    I have Ray's description on the pad in front of me: five-ten, brown hair going grey at the temples, a scar on his left forearm from a welding accident in the Navy. His workplace — the city surveying department on Bleecker. His last day — Thursday the seventeenth. He brought papers home the week before he vanished and didn't explain them to his wife.
  - |-
    Vera writes me a check for three days and stands up. She does it the same way she sat down — like the chair was always only temporary.
  - female_adult_american_grounded_professional: |-
      He believed in what he was doing. Nine years with the city and he never complained about the work. Whatever he found, it mattered enough to him to bring it home. I'd like to know what it was.
  - |-
    She doesn't say: I'd like to know if he's still alive. She doesn't have to.

choices:
  - text: |-
      Start at the surveying department — that's where he worked, that's where the answer starts
    next: act1/legwork_survey_dept

  - text: |-
      Start at his usual lunch counter — a man's habits tell you more than his employer
    next: act1/legwork_lunch_counter
