id: act1/beat3_exit

text:
  - |-
    Frank sits with his notebook on the passenger seat. The parcel number. The permit that doesn't match its address. Ray's signature on a document Ray didn't sign. Boundaries moving east in a pattern too regular to be error.
  - |-
    He doesn't understand all of it yet. He has the shape of something — municipal, deliberate, and large enough that a city surveyor who looked at it too carefully disappeared.
  - |-
    He started the day looking for a missing husband. That's not what he's looking at now.

choices:
  - text: |-
      Go back to the office — think it through before the next move
    next: act1/office_hub_act1
