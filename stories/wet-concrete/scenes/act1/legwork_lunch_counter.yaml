id: act1/legwork_lunch_counter

text:
  - |-
    Denny's Counter on Huron, three blocks from the surveying department. Red stools, a radio playing something nobody's listening to. The girl behind the counter wipes down the same patch of formica twice.
  - female_young_american_sweet_youthful_clear: |-
      Oh, Ray — sure, he comes in — came in. Same stool, third from the end. Black coffee, the pork chop special on Wednesdays even though I always told him the Tuesday roast was better. He was a creature of habit, is what I'm saying.
  - |-
    She stops wiping. A thing she just said has caught up with her.
  - female_young_american_sweet_youthful_clear: |-
      Last week he was different, though. He had something in his breast pocket — folded up tight, kept touching it like he was checking it was still there. He didn't finish his coffee. That's the thing I remember most: he didn't finish his coffee.

choices:
  - text: |-
      Ask if anyone else came in and sat with him
    next: act1/lunch_counter_company

  - text: |-
      Ask if he seemed scared
    next: act1/lunch_counter_mood
    effects:
      stats:
        evidence: 1

  - text: |-
      Leave and head to the surveying department next
    next: act1/legwork_survey_dept
