id: act1/aldwick_door_sympathy

text:
  - |-
    She looks at him for a moment. The word "hurt" does something.
  - |-
    She opens the door wider.
  - |-
    Her husband works for a man who runs a small machine shop on the east end of the block. The lease has been contested for six months — boundary error, the city says. The shop pre-dates the survey error by thirty years. Doesn't matter. The city has documents.
  - |-
    She says all this the way people say things they've said many times, looking for someone who'll hear it differently.

choices:
  - text: |-
      Ask if she's heard of Ray Doss
    next: act1/aldwick_door_ray_name

  - text: |-
      Thank her — the pattern's clear now
    next: act1/aldwick_parcel_check
