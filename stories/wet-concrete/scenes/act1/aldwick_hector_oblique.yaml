id: act1/aldwick_hector_oblique

text:
  - |-
    Hector looks at Frank for a moment. The story lands like a stone on shallow water.
  - male_elder_american_wise_approachable: |-
      Property boundary issue. Sure. We've had a lot of that.
  - |-
    He shifts on the stoop but doesn't stand.
  - male_elder_american_wise_approachable: |-
      My neighbour's house — the yellow one at the end — that house is technically on a different parcel than it was two years ago. City says it's a correction. Surveying error from the original filing. That's what they say. The house hasn't moved. The property line has.
  - |-
    He looks east, toward the survey crews.
  - male_elder_american_wise_approachable: |-
      Same story on four lots I know of. Correction. Correction. Correction.

choices:
  - text: |-
      Press on the "correction" — that's not what corrections look like
    next: act1/aldwick_hector_detail
    effects:
      stats:
        evidence: 1

  - text: |-
      Let it settle — he's given you the shape of it
    next: act1/aldwick_parcel_check
