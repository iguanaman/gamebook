id: act1/vera_missed_clue

text:
  - |-
    He moves through the house the way he was trained to — working from the outside in, touching nothing he doesn't need to touch.
  - |-
    They were thorough. The coat closet by the door, the kitchen drawers, the space under the water heater — pried up, recently, the wood still pale where it was lifted.
  - |-
    In the coat closet, in the inside breast pocket of a wool overcoat that hangs too far back to be worn regularly: a scrap of paper. A pocket square wrapped around it, so it wouldn't fall out.
  - |-
    One word: Aldwick. Below it, a street number. No street name. Not nothing — but not the file.

choices:
  - text: |-
      Take it and leave
    next: act1/vera_death_aftermath
