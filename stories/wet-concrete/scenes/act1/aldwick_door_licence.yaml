id: act1/aldwick_door_licence
text:
- She reads the licence card carefully. Whatever she was expecting, it wasn't this.
- She opens the door and tells him about the surveyor — not the city's surveyor. A
  different one. He came on his own time, she says, evenings twice. Looked at the
  boundary stakes and shook his head like a man checking work someone else did wrong.
  He told her husband the line had been moved — not corrected, moved.
- He wasn't official, she says. But he had a notebook and he wrote things down.
choices:
- text: That was Ray Doss
