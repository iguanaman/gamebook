id: act1/aldwick_door_ray_name

text:
  - |-
    She doesn't know the name Ray Doss. But she knows the man — the description fits. She remembers the notebook. She remembers him coming back a second time with a camera.
  - |-
    He told her husband it wasn't right, what the city was doing. That was the last time she saw him. A month ago, maybe six weeks.
  - |-
    She looks at Frank's face.
  - |-
    She doesn't ask what happened to him. She already knows the shape of the answer.

choices:
  - text: |-
      Ask who else in the neighbourhood he talked to
