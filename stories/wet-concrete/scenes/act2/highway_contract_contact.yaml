id: act2/highway_contract_contact
text:
  - |-
    A phone call to the right extension. A name spoken quietly. The contact — a mid-level clerk in the assessor's office who hasn't forgotten what Frank did for his daughter in '44 — meets Frank at a side entrance on the third floor at seven-thirty.
  - |-
    He holds the door without looking at him. Leaves before Frank is three steps inside.
  - |-
    The federal highway contract is in the third drawer. Frank has twenty minutes.
  - |-
    The right-of-way corridor runs directly through Aldwick's east block. Six parcels. Federal acquisition authority. City development rights for the corridor-adjacent land revert to whoever holds title at the time of the federal survey — and the federal survey is scheduled for Q3 1946. Whoever owns those parcels in eighteen months walks away with the development premium on a federal highway.
  - |-
    Harmon Land Trust is buying those parcels now, while they're condemned, while they're cheap.
  - |-
    Ray Doss found the boundary discrepancies. He must have pulled the same thread.
choices:
  - text: |-
      Copy the contract reference numbers — this is what Ray found
    next: act2/beat3_aldwick_return
    effects:
      stats:
        evidence: 1
