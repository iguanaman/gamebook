id: act2/beat6_bluff

text:
  - |-
    Frank nods. Says he hears them. Thanks them for the trip up the stairs. The taller one stands. The shorter one moves away from the door.
  - |-
    They leave without shaking hands.
  - |-
    Frank sits in the chair where Vera sat in October and looks at the address on the window glass — backward from here, forward from the street. They mentioned Trumbull by name. They knew he'd been there. They knew before he walked up those steps.
  - |-
    They let him find the ledger. They let him carry it out. They're not trying to stop him from having it. They're watching to see what he does with it.

choices:
  - text: |-
      They let you find it. That changes what the ledger is.
    next: act2/beat6_exit
