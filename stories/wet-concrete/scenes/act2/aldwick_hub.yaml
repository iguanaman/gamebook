id: act2/aldwick_hub
text:
  - |-
    Aldwick on a Tuesday afternoon. A street that used to have a hardware store at the corner; it's empty now, the window soaped from the inside. Three condemned notices on the block between here and June Holt's building.
  - if: visited
    text: |-
      The neighbourhood is starting to know Frank's face. Whether that's an asset depends on who's doing the knowing.
  - if: {flags: [craddock_exhausted]}
    text: |-
      Craddock's given him everything he has. The stoop is empty when Frank passes.
choices:
  - text: |-
      Find Craddock — the old man who said the condemnation inspector never looked at the buildings
    next: act2/craddock_approach
    requires:
      flags_unset:
        - craddock_exhausted
    failed_text: |-
      *(You've gotten everything Craddock has to give.)*
  - text: |-
      Find June Holt — she showed you the letter about relocation money assigned before residents were notified
    next: act2/june_approach
    requires:
      stats:
        rep: 4
      flags_unset:
        - june_exhausted
    failed_text: |-
      *(June Holt has no reason to trust you yet.)*
  - text: |-
      Listen — walk the streets, say nothing, let the neighbourhood tell you what it knows
    next: act2/aldwick_listen
    effects:
      stats:
        rep: 1
  - text: |-
      Find Marta Gaines — she's been documenting the boundary shifts since the beginning
    next: act2/marta_act2_approach
    requires:
      flags:
        - craddock_exhausted
      stats:
        rep: 3
    failed_text: |-
      *(Marta won't talk to you yet. Do the groundwork first.)*
  - text: |-
      Go back to the office — process what you have
    next: act2/office_hub_act2
