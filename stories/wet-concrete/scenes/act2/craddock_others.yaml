id: act2/craddock_others
text:
- male_midlife_american_dark_tough: Wrote to the alderman. Wrote to the city ombudsman.
    Wrote to the state housing board — that one came back with a form letter that
    didn't address anything I'd said.
- He doesn't sound surprised by any of it. Just tired in the specific way of a man
  who believed the process would work.
- male_midlife_american_dark_tough: There's a woman on the south end who's been keeping
    better records than I have. Marta Gaines. You want the full picture, she's got
    it. I'll put in a word if you need it.
- He studies Frank for a moment.
- male_midlife_american_dark_tough: You going to do something with this, or are you
    writing a letter too?
choices:
