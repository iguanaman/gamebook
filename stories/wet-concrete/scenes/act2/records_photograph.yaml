id: act2/records_photograph
text:
  - |-
    Frank gets the camera out while the clerk's head is down. Rolls through the Aldwick re-filings fast — both sets, the authorisation page, the registered agent entry. Twelve frames.
  - |-
    The clerk looks up on the thirteenth.
  - |-
    He doesn't say anything. Frank doesn't say anything. Frank puts the camera away and closes the ledger with the careful courtesy of a man who was always going to close it exactly like that.
  - |-
    The clerk watches him walk to the door.
choices:
  - text: |-
      Get out of the building
    next: act2/records_photograph_exit
    effects:
      stats:
        evidence: 2
        heat: 2
      flags:
        records_room: true
