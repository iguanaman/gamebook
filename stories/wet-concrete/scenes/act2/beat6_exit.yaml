id: act2/beat6_exit
text:
- Frank spreads what he has across the desk. The ledger. The copy of Ray's unsent
  letter. The notes from six weeks of records and conversations and neighbourhood
  walks. The shape of it — the boundary re-filings, the shell companies, the federal
  highway corridor, the men with development committee seats and condemned land bought
  at below-market prices.
- He knows the machine. He knows some of the names on it. He knows people are watching
  him and some of them carry badges.
- He doesn't know yet what he's going to do about it. That's the next question.
