id: act2/holding_company_agent
journal: |-
  The holding company's registered agent was a city councilman. Ray knew exactly what he'd found.
text:
  - |-
    Harmon Land Trust LLC. Registered October 1944. Shell address on Charter Street — a mail drop, not an office. The incorporation documents name one registered agent.
  - |-
    Aldous Vane. Deputy chair, city development committee, since 1943.
  - |-
    Frank writes it down in the margin of his notepad and looks at what he's written. An elected official, registered personally as the agent for a private holding company that benefits every time a city boundary moves in Aldwick. The conflict of interest alone would end a career. The question is how far the corruption runs above and below him.
  - |-
    The machine has a name now. It doesn't have a face yet. Vane is a deputy. Someone chairs that committee.
choices:
  - text: |-
      Find out what contracts Vane's committee has approved in the last three years
    next: act2/vane_contracts
    effects:
      stats:
        evidence: 1
  - text: |-
      That's enough — go to the office with what you have
    next: act2/beat3_aldwick_return
