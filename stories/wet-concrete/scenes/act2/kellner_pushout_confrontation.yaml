id: act2/kellner_pushout_confrontation
text:
- Kellner looks at him. Long enough that it's not comfortable.
- male_midlife_american_rich_smooth_rugged: '[sigh] You should have let that one go,
    Frank.'
- He doesn't confirm it. He doesn't deny it. He says it the way a man describes a
  fact about the weather — not an admission, not a defence. A description of what
  already happened and cannot be changed.
- He puts two dollars on the table and picks up his hat.
choices:
- text: Let him walk
  next: act2/office_hub_act2
