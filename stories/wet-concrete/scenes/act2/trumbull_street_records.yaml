id: act2/trumbull_street_records
text:
- The condemned building permits for Aldwick's south block. Frank finds them in the
  public records binder — standard enough to be filed openly, obscure enough that
  nobody asked. Six buildings condemned in the same week, fourteen months ago.
- Five of them have demolition permits filed within thirty days. The sixth — 44 Trumbull
  Street — has no demolition permit at all. The condemnation order is there. The follow-through
  isn't. Someone put the building on the condemned list and then made sure it stayed
  standing.
