id: act2/marta_closed
text:
- She opens the door. Looks at Frank. Closes it again.
- No words. The latch clicks. Frank stands on the step in the afternoon light, listening
  to a neighbourhood he hasn't spent enough time in.
choices:
- text: Come back when you've earned it — more time in Aldwick first
  next: act2/aldwick_hub
- text: Try the records approach — Marta's path is closed
  next: act2/trumbull_street_records
