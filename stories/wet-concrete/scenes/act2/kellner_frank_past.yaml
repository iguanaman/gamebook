id: act2/kellner_frank_past
text:
- Kellner settles into it like a man who has been waiting to be asked. He remembers
  a specific night — February of '41, a warehouse on the south dock, the arrest that
  went right when it easily could have gone wrong. He gets the details correct. The
  cold. The name of the sergeant who ran.
- male_midlife_american_rich_smooth_rugged: That was the best version of what we used
    to do, Frank. You and me and Reyes and the whole OCU before everything got complicated.
    You remember how clean it felt when it worked?
- He says it like a man building a ledger. Specific memories, carefully placed. Frank
  can feel the shape of it — warmth that documents itself.
