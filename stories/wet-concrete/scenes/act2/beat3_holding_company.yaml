id: act2/beat3_holding_company
text:
  - |-
    The holding company is called Harmon Land Trust LLC. Frank found the name in the re-filing documents — the beneficiary listed each time a boundary shifted. Now he's going to find out who owns it.
  - |-
    The incorporation registry is public record. The city planning archives are not. Frank has a name, a courthouse, and the rest of the morning.
choices:
