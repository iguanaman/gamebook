      Stop at the registered agent — you have enough to name the connection
    next: act2/holding_company_agent
    effects:
      stats:
        evidence: 1
  - text: |-
      Follow the memo thread — there's a reference to a federal highway contract in old city council minutes
    next: act2/highway_contract_dig
    effects:
      stats:
        heat: 1
  - text: |-
      Look up the development committee's voting record — if they voted the right way, that's the quid pro quo
    next: act2/committee_vote_check
