id: act2/office_hub_act2
text:
  - |-
    Frank's office. The phone on the desk. The window with the crack in the lower pane he keeps meaning to fix. The work spread across the table in two stacks — what he knows, what he still needs.
  - if:
      stats:
        heat: 5
    text: |-
      The note was still there when he came in. Someone slid it under the door while he was out. He hasn't opened it yet.
  - if: {flags: [cops_warned_off]}
    text: |-
      He works with the light off when the street is quiet. Old habit.
choices:
  - text: |-
      Read the note that was slid under the door
    next: act2/office_note_threat
    requires:
      flags_unset:
        - office_note_read
      stats:
        heat: 3
    hide_if_failed: true
  - text: |-
      Call Walt Kellner back — he's been leaving messages
    next: act2/kellner_first_contact
    requires:
      flags_unset:
        - kellner_surfaced
    hide_if_failed: true
  - text: |-
      Go see Kellner — the meeting he suggested
    next: act2/kellner_arrive
    requires:
      flags:
        - kellner_surfaced
      flags_unset:
        - confronted_kellner
    hide_if_failed: true
  - text: |-
      Mail the evidence copy to Dora Reyes — insurance
    next: act2/mail_package
    requires:
      flags:
        - found_ledger
      flags_unset:
        - left_package
    hide_if_failed: true
  - text: |-
      Get back to work — Aldwick has more to give
    next: act2/aldwick_hub
