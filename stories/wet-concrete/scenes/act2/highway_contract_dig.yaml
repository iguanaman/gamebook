id: act2/highway_contract_dig
text:
  - |-
    Deep in the city council minutes from March of last year — a reference, almost a footnote: "Federal Right-of-Way Coordination, Harmon City Sector 4, contingent on site preparation completion Q3 1946." No attachment. No detail. Frank copies the reference number.
  - |-
    The full contract is in the planning archive. The planning archive is classified as working documents — not public record, not a library. It's in a room on the third floor of city hall that Frank has no authorisation to enter.
choices:
  - text: |-
      Use a contact to get in — you know people in city hall who owe you small favours
    next: act2/highway_contract_contact
    requires:
      stats:
        rep: 4
    failed_text: |-
      *(You don't have the standing to call that favour. Not yet.)*
  - text: |-
      Break the lock — it's a file cabinet in a public building at 9pm, not a safe
    next: act2/highway_contract_break
    effects:
      stats:
        evidence: 2
        heat: 2
  - text: |-
      Back off — the archive is too risky right now
    next: act2/beat3_aldwick_return
