id: act2/harmon_land_trust_lookup
journal: |-
  I found the name behind Harmon Land Trust. Elected government money moving through a private company to buy condemned land. Ray knew what he was looking at.
text:
  - |-
    The incorporation registry is a ledger behind the public desk — technically accessible, practically ignored. Harmon Land Trust LLC, registered October 1944. One registered agent listed.
  - |-
    The name is Aldous Vane.
  - |-
    Frank has seen that name before. Development committee, city council. Deputy chair since 1943. The man who sits on the committee that approves city development contracts, registered as the agent for a private holding company that benefits from city boundary decisions. Elected government money moving through a private address to buy condemned land.
  - |-
    Ray Doss was a surveyor who noticed the boundary files were wrong. That's what he was doing in Aldwick on weekends. That's what he found.
  - |-
    Frank sits with it for a moment in the stacks, alone with the smell of old paper and the particular silence of a room full of documents no one is supposed to read.
choices:
  - text: |-
      Go to the office — you need to think about what this means before the next move
    next: act2/office_hub_act2
    effects:
      stats:
        evidence: 1
