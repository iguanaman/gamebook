id: act2/craddock_authorisation
text:
- Craddock reaches into his jacket and produces an envelope. Not the first time he's
  done this — the fold is worn soft.
- male_midlife_american_dark_tough: Condemnation order. City seal, everything. Name
    at the bottom is Deputy Chair Vane. Development committee. He signs all of them
    — every one in this block, the two blocks south. Same signature. Same man.
- Frank reads the order. The name is familiar — he's seen it on the re-filing authorisations
  at the records office. The same name on the same paper in two separate offices doing
  two separate things that produce the same result.
- male_midlife_american_dark_tough: I sent a letter to my alderman six months ago.
    No reply.
- He takes the envelope back. He's made copies.
