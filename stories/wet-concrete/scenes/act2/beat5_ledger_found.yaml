id: act2/beat5_ledger_found
text:
- 'Under the board: a surveyor''s field ledger, cloth-bound, the cover worn at the
  corner from use. Ray Doss''s handwriting on the first page — date, location, a column
  of coordinates. He set the original boundary figures against the filed versions.
  The discrepancies are marked in red ink. Systematic. Impossible to explain as error.'
- 'Behind the ledger, folded flat against the bottom of the cavity: a carbon copy
  of a letter addressed to the state auditor''s office. The date is three months ago.
  It was never sent.'
- Frank sits back on his heels. This is what Ray was doing on his Sundays. This is
  what he died with.
journal: You found Ray's ledger. Original coordinates against the filed versions,
  discrepancies marked in red. A letter to the state auditor he never sent.
choices:
- text: Take everything and get out — you have what Ray died for
  next: act2/beat5_depart
  effects:
    flags:
      found_ledger: true
    stats:
      evidence: 3
      heat: 2
