id: act2/trumbull_street_search
text:
- Six buildings on the condemned south block. Frank walks them in order, starting
  from the corner. Three are genuinely empty — doors off their hinges, water damage,
  the smell of old wood going bad in the dark. Two have been picked clean. The sixth,
  second from the end, is different.
- The floor inside is swept. Not cleaned — swept, recently, with intention. Someone
  has been using this building while the city thought it was sitting vacant. The street
  number is still faintly readable above the door frame.
- 44 Trumbull Street.
