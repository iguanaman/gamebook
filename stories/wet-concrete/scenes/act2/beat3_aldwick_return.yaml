id: act2/beat3_aldwick_return
text:
  - |-
    Frank sits with what the public record will give him. Harmon Land Trust buys condemned land. The condemnation authority is the development committee. The committee's deputy chair is the holding company's registered agent. The committee chair makes sure the votes go right.
  - |-
    Aldous Vane. Leland Dowd. Two names on a page. Neither of them knows Frank has them yet — or if they do, they haven't done anything about it. That will change.
  - |-
    The next question is whether the documents Frank has found are enough to prove anything, or whether they're just enough to get him killed.
choices:
  - text: |-
      Go back to Aldwick — the neighbourhood threads need to close
    next: act2/aldwick_hub
  - text: |-
      Go to the office first — Kellner's been reaching out, and it's time to decide what to do about him
    next: act2/office_hub_act2
