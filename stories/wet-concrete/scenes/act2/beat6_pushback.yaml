id: act2/beat6_pushback

text:
  - |-
    Frank says he's been warned before. Says he's been warned by men holding better cards than this, and those men are not where they expected to be either.
  - |-
    The taller one goes very still. The shorter one looks at the taller one.
  - |-
    That look. The shorter one checking — checking whether they're past a line, or whether there's still time. There's a deadline on this. Something is moving faster than Frank thought. Whatever they're protecting isn't settled yet; it's in transit.
  - |-
    They leave. The taller one last, and he pauses in the doorway one beat longer than necessary. But he leaves.

choices:
  - text: |-
      A deadline means a timetable. That's information.
    next: act2/beat6_exit
    effects:
      stats:
        evidence: 1
