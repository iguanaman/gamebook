id: act2/marta_act2_full
text:
- 'She opens the notebook on the kitchen table. Seventeen pages — parcel numbers,
  condemnation dates, the name of each family who left and each family still holding.
  A map she drew herself: condemned blocks in red, Ray''s resurvey marks in blue,
  the east boundary as filed against the east boundary as it actually sits on the
  ground.'
- female_midlife_african-american_casual_opinionated: Ray was out here on Sundays.
    His own time, no client, no file number. He kept coming back to one building —
    said it was the quiet one. Forty-four Trumbull Street. South block, second from
    the end. He brought his own tape measure.
- She closes the notebook and looks at Frank.
- female_midlife_african-american_casual_opinionated: If he left something, it's there.
    He was careful. He wouldn't have left it anywhere else.
journal: Marta Gaines showed you everything. Seventeen pages of parcel numbers and
  a hand-drawn map. Ray kept returning to 44 Trumbull Street — the quiet one.
choices:
- text: 44 Trumbull Street — that's where Ray hid the ledger
