id: act2/beat5_approach
text:
- 44 Trumbull Street. Condemned fourteen months ago — the order is posted on the door,
  city seal, the usual language. Frank tries the handle. It opens.
- 'Inside, the light comes in sideways through boards over the windows. The front
  rooms are empty. The kitchen at the back is where the feeling changes — not an abandoned
  space, a used one. A surveyor''s habit: work where nobody will interrupt you.'
- The kitchen floor. One board sits slightly proud of the rest.
