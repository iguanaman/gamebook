id: act3/beat3_last_angle
text:
- A diner on Poole Street, six blocks from anywhere he's been. The kind of place where
  nobody remembers faces. Frank takes a booth near the kitchen and orders coffee he
  won't drink.
- He puts what he has on the table — figuratively. The ledger, if he has it. The photographs.
  The parcel numbers Marta traced. Ray's draft letter, if he found it. The holding
  company chain.
- if:
    stats:
      evidence: 6
  text: It's enough. Not for a courtroom — nothing here is enough for a courtroom
    — but for a reporter. The ledger alone would give Dora Reyes three weeks of front
    page. Add Ray's letter and she could name names. Add the holding company chain
    and she could trace the money. A good editor could print this. The right editor
    could print it twice.
- if:
    stats:
      evidence: 6
  else: It's the shape of something. He knows what happened — the rezoning, the forgeries,
    the money, Ray's disappearance, Vera's death. He can see the whole machine. He
    can't prove any piece of it to anyone who matters. A reporter would need facts,
    not a pattern. A court would need evidence, not a private detective's conviction.
- The coffee arrives. He doesn't touch it.
choices:
- text: Read through what you have — make sure you understand it before you decide
    what to do with it.
  next: act3/last_angle_review
