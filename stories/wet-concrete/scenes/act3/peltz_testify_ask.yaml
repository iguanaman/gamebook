id: act3/peltz_testify_ask

text:
  - |-
    Frank asks if he'll go on record. Not now, not today — but when the time comes. A state auditor's inquiry, a reporter's sworn affidavit. Will he say what he just said to Frank?
  - |-
    Peltz is quiet for a long time. Long enough that Frank thinks he's going to say no.
  - male_young_american_weak: |-
      I'll think about it.
  - |-
    He doesn't say no. Frank knows that's as close to yes as a man with a family gets in Harmon City in 1947.

choices:
  - text: |-
      It's enough — leave him to it.
    next: act3/peltz_act3_resolve
    effects:
      stats:
        rep: 1
