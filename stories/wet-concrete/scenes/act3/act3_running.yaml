id: act3/act3_running

text:
  - |-
    You're on the street. No coat, no plan, the ledger still in your jacket pocket because there was no time to do anything with it. Three blocks from Calder before you slow down enough to think.
  - |-
    The office is compromised. The phone is compromised. Anyone you were seen with in the last two weeks is now a liability. You have maybe twelve hours before Kellner's people formalise the net — and then there's nowhere in Harmon City that's safe for the man who just walked out of Walt Kellner's meeting.
  - |-
    You move on institutional memory. Back exits. Side streets. The kind of routes a man only knows after years on the force. You have time for two errands. Not three.

choices:
  - text: |-
      Warn June Holt — the men who condemned her block know she talked. She's exposed.
    next: act3/running_warn_june

  - text: |-
      Find Peltz — Ray's coworker might have one more piece if he can be convinced Frank isn't a dead man already.
    next: act3/running_find_peltz

  - text: |-
      Do neither. Move faster, keep the heat from climbing.
    next: act3/running_move_fast
