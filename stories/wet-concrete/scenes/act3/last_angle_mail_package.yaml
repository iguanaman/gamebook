id: act3/last_angle_mail_package

text:
  - |-
    There's a post office on Poole Street. Frank takes the key pages — the original coordinates, the auditor's letter, the first three pages of the ledger with Ray's annotations — and wraps them in plain brown paper. Care of the editorial desk. Dora Reyes. No return address.
  - |-
    The clerk doesn't look up.

choices:
  - text: |-
      Drop it and walk away. Whatever happens to you now, those pages are already moving.
    next: act3/last_angle_package_sent
    requires:
      flags_unset:
        - left_package
    hide_if_failed: true
    effects:
      flags:
        left_package: true
      stats:
        heat: 1
