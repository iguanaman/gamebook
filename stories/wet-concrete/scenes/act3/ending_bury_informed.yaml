id: act3/ending_bury_informed

journal: |-
  You burned the copies and buried the ledger. You knew exactly what you were leaving behind.

text:
  - |-
    Frank burns the copies in a trash can behind the rooming house on Aldwick Street. The photographs first. Then his notes. Then the duplicate pages he made of the ledger's most damning entries.
  - |-
    The ledger itself he puts back somewhere it will stay buried. A different floor. A condemned building off Collis Avenue, three blocks from where Ray Doss used to walk his survey routes. He doesn't mark the spot. He doesn't need to remember where it is.
  - |-
    He drives north out of Harmon City before dawn. The highway stretches out in front of him — the same highway corridor that killed Ray Doss and Vera Doss and whatever future the Aldwick residents thought they were still allowed to have.
  - |-
    He knows what the city is smiling about. He did the calculation — his life against a story that might get buried anyway, against a machine that survives exposure and restructures, against two dead people who trusted him to carry it the last step.
  - |-
    He made the call. He's the one who has to drive with it.
  - |-
    Walt Kellner shakes someone's hand at a function in two weeks and doesn't lose a night's sleep. Leland Dowd's highway corridor breaks ground in the spring. The Aldwick residents who are still there get the relocation checks that were already cut. The city keeps smiling.
  - |-
    Frank drives until the lights are behind him. He knows they're there.

