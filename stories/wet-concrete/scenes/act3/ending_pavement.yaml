id: act3/ending_pavement

text:
  - |-
    The city doesn't pause. Somewhere on Calder Street a trolley passes. A woman walks a dog. A man in a grey coat stops at a newsstand and doesn't buy anything.
  - |-
    Kellner sets his coffee cup down. It's still full. He picks up the ledger from the seat where you left it and slides it into his coat without looking at it.
  - |-
    The investigation ends here. The men who built the trap are already making other calls. Dora Reyes never gets a package. Harmon City never blinks.
  - |-
    Frank Cain. Ex-detective. Found the shape of the thing. Didn't get out with it.

