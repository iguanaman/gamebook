id: act2/act2_threshold

text:
  - |-
    玄関。カバンはここに置いておいた。チケットはまだ有効だ。
  - |-
    振り返ると——廊下、台所、庭、地下への蓋。あなたが見たもの。あなたが説明できないもの。あなたが家が知っているはずのない名前を呼ばれたこと。
  - japanese_female_adult_japanese_cheerful_clear: |-
      ライアン、ちょっと——
  - |-
    続かなかった。

choices:
  - text: |-
      ここに留まる
    next: act3/act3_entry

  - text: |-
      今すぐ出る
    next: act2/threshold_leave
