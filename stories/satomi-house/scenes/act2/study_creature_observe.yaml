id: act2/study_creature_observe

text:
  - |-
    あなたは動かずに見ていた。二組の指が、節子さんのノートと土地台帳を行き来している。照合、確認、また戻る。何かの検証作業だ。
  - |-
    もう一度、舌打ち。
  - |-
    そしてそれが顔を上げた。目が、想定した位置にない。あなたと視線が合った——合ったと思う——そしてそれはノートを落とした。べしゃ、という音が書斎に響いた。
  - |-
    それは立ち上がろうとし、棚に肩をぶつけ、もう一冊落とし、それからあなたの方を一切見ないようにしながら、本棚の隙間——そこには入らないはずの隙間——にするりと消えていった。相当な速さで。相当な尊厳とともに。
  - |-
    床に、栞が残っている。古い葉を押したもの。それは節子さんのノートを読んでいた。
  - japanese_female_adult_japanese_cheerful_clear: |-
      すみません、と言うべきだったかもしれない。

choices:
  - text: |-
      栞を手に取る
    next: act2/study_documents
    effects:
      stats:
        curiosity: 1

  - text: |-
      そのまま書類へ
    next: act2/study_documents
