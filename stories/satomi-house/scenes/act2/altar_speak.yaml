id: act2/altar_speak

text:
  - |-
    「あの——邪魔してすみません。」あなたは言った。「相続で来ました。長くはいません。」少し間があった。「何をしているのか、わかっていないんですが。」
  - |-
    消えかけていた気配が、止まった。
  - |-
    聞いていた。あなたが言ったことを、何かが聞いていた。それからゆっくりと、消えた。ランプだけが残った。
  - japanese_female_adult_japanese_cheerful_clear: |-
      聞いてた。何かが聞いてた。私が言ったことを。

choices:
  - text: |-
      地上に戻る
    next: act2/altar_return
