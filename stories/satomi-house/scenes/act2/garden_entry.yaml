id: act2/garden_entry

text:
  - |-
    庭は昼間だと全体が見える。草が伸びているが、無秩序ではない——どこに何が育つか、何かが決めている。竹は奥の石塀を突き破って伸びている。
  - |-
    左に石水盤。奥の隅に、地面の乱れ。土を誰かが最近掘った跡がある。
  - |-
    そして、それがいた。低い。足が多すぎる。配置がおかしい。あなたを見た瞬間、あなたもそれを見た。
  - |-
    二つとも、止まった。
  - japanese_female_adult_japanese_cheerful_clear: |-
      なんか、あそこにいる。

choices:
  - text: |-
      じっとしている
    next: act2/garden_standoff

  - text: |-
      近づく
    next: act2/garden_creature_flee

  - text: |-
      掘り返した地面へ
    next: act2/garden_ground
    effects:
      stats:
        curiosity: 1
        composure: -1
