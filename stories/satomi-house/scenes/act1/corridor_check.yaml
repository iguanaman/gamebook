id: act1/corridor_check

text:
  - |-
    スマートフォンのライトで照らした。光が届く範囲に、壁があるはずだった。
  - |-
    壁がない。廊下はまだ続いている。あなたは歩数を数えた。二十二歩。戻ってまた数えた。二十二歩。家の外からではその長さはあり得ない。
  - japanese_female_adult_japanese_cheerful_clear: |-
    二十二歩。外から見たら十四歩ぶんの家。
  - japanese_female_adult_japanese_cheerful_clear: |-
    疲れているだけだ。

choices:
