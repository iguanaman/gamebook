id: act3/act3_confront_undo

text:
  - |-
    祭具を、置かれていた位置から外す。紙を別の折り方で畳む。壊さない——ただ、配置を解く。ファイルを閉じる感触だ。
  - |-
    家が音を立てる。落ち着く音ではない。息を止めた音だ。気配はまだここにある——ただ、繋ぎ留めているものがなくなった。どこへ行くのか、わからない。ナレーターも推測しない。
  - |-
    灯明が消える。書斎の多指は移動している——いなくなったわけではなく、別の場所にいる。天井が静かだ。あまり深く考えないようにする。
  - |-
    お茶を淹れる。天井のことは、あまり深く考えない。

choices:
  - text: |-
      お茶を淹れる
    next: act3/act3_confront_morning
