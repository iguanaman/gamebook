id: act3/act3_confront_bad

text:
  - |-
    祭壇の前に立つ。何かしなければならない——それだけははっきりしている。何をするかは、はっきりしていない。
  - |-
    祭具に手を触れる。理解からではなく、意志から。気配がある。見ている。去らない。
  - |-
    やることの形が、文の途中で止まっている——最後の節が欠けた文章を読んで、閉じてしまったような感触だ。
  - |-
    家は落ち着かない。気配は去らない。灯明は消えない。全てが来たときのままだ——ただ、あなたがここで何かを試みたことを、今はわかっている。
  - japanese_female_adult_japanese_cheerful_clear: |-
      やった。やったけど——
  - |-
    翌朝、書類を処理する。帰る。夢は見ない——廊下の夢ではなく、名前を知っているが口に出さないものの夢を見る。まだ出さない、というだけで。
  - |-
    一週間後、ロンドンの部屋で、置いた場所にないものがある。小さなもの。説明はつく。説明をつける。

choices:
  - text: |-
      帰る
    next: act3/act3_confront_bad_end

journal: |-
  あなたは祭壇に向き合ったが、何をすべきかがわからなかった。何かが、ついてきた。
