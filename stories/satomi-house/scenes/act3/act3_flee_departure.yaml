id: act3/act3_flee_departure

text:
  - |-
    同じ道を、同じ距離だけ歩く。重さだけが違う。スーツケースの車輪が、来たときにひっかかった道の割れ目を、今回は越えていく。
  - |-
    二十分後、コンビニの駐車場から木村さんに電話する。書類の話。彼の声には、予想していた人間のエネルギーがある。
  - if: {stats: {composure: 6}}
    text: |-
      手際よく済んだ。こういうことは手際よく済ませればいい。
    else: |-
      いくつかのことを、考えないようにしている。廊下。石に刻まれた名前。消える前の灯明の光。考えていない。
  - |-
    何か食べる。運転する。家は後ろになり、幹線道路に出ると見えなくなる。
  - |-
    ライアンにメッセージを打つ。今度は本当に送るもの。「早めに帰る。家は売った。後で話す。」
  - |-
    電車に乗る。飛行機に乗る。眠る——到着してから、ちゃんと眠れていなかった。

choices:
  - text: |-
      電車に乗る
    next: act3/act3_flee_aftermath
