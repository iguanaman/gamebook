id: act3/act3_entry

text:
  - |-
    入口に立っている。家はあなたの後ろにある。道は前にある。
  - |-
    あなたが持っているものを数える——バッグの中身ではなく、別のもの。廊下の寸法が合わないこと。台所の天井にいるもの。祭壇の写真、そこに写った顔。一度だけ呼ばれた、自分の名前。
  - if: {stats: {composure: 6}}
    text: |-
      頭の中で二つのリストができあがっている。確認できたこと。説明できないこと。どちらのリストも、それなりに長い。
    else: |-
      頭の中がいつもより静かだ。
  - |-
    スマートフォンを取り出す。電波は届いている——到着したとき気づいたことで、今は意味を持って感じられる。

journal: |-
  あなたは入口に立った。家が後ろにある。道が前にある。決断の時だ。

choices:
  - text: |-
      ライアンに電話する
    next: act3/act3_ryan_voicemail

  - text: |-
      電話しない——スマートフォンをしまう
    next: act3/act3_no_call

  - text: |-
      田中さんから着信がある
    next: act3/act3_tanaka_call
    requires:
      flags: [met_neighbour]
    hide_if_failed: true
