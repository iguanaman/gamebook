id: act3/act3_confront_ending

text:
  - |-
    ライアンはしばらく黙っている——それから、「木曜の朝のフライト、取っておく」と言う。廊下についての追加質問はない。そういう人だ。
  - |-
    庭に座っている。膝の上にスマートフォン。家が後ろにある。竹やぶの方で、時折、何かが動く気配がする——聞こえるだけで、見えない。
  - if: {flags: [confront_undo]}
    text: |-
      ここにいたものが今どこにいるかは、わからない。廊下の寸法は、おそらくずっと合わないままだ。不動産屋に伝えよう。彼は驚かないはずだ。
    else: |-
      廊下の寸法は、ずっと合わないままだろう。不動産屋に伝えよう。彼は驚かないはずだ。
  - japanese_female_adult_japanese_cheerful_clear: |-
      庭にいる。それだけでいい。

choices:
  - text: |-
      庭にいる
    next: act3/act3_confront_end
