id: act3/act3_flee_aftermath

text:
  - |-
    ロンドン。自分のベッド。ライアンの重さが向こう側にある——それで十分だ。一週間、有能で、効率的で、完全に正常だった。
  - |-
    それから夢を見る。
  - |-
    あの廊下にいる。前より長い。歩く。
  - if: {stats: {curiosity: 7}}
    text: |-
      廊下の先に扉がある——開けなかった扉だ。夢の中で、名前がわかっている。目が覚める前には、もう忘れている。
    else: |-
      どこかの家の廊下だ。間違っている。それだけわかって、目が覚める。
  - if: {flags: [found_altar]}
    text: |-
      突き当たりに、灯明の明かりがある。
  - |-
    目が覚めたとき、頭の中にひとつの文ができている。いつもなら、そのままライアンに送るたぐいのもの。
  - japanese_female_adult_japanese_cheerful_clear: |-
      [sigh] 送らない。
  - |-
    暗い中に横になっている。家は待っている。そのことをあなたに伝えない。でも、もうわかっている。

choices:
  - text: |-
      目を覚ます
    next: act3/act3_flee_end

