id: act3/act3_confront_complete

text:
  - |-
    祭壇の前に座る。ノートに書かれた順番通りに、祭具を並べる。紙を正しく折る。供物を新しいものに替える。節子さんがやっていたこと。維持管理だ。
  - |-
    終わったとき、家が息を吐く——文字通りに、一度。古い木の、長い落ち着きの音。
  - |-
    天井の住人が別の場所にずれる。書斎の多指が本を閉じる。庭の何かが——壁越しに聞こえる——止まる。
  - |-
    長い間、誰かを待っていたものが、ようやく届いたから去っていく——そういう質感の静けさだ。灯明が消える。地下室が暗くなる。
  - |-
    台所の棚で見つけた茶葉でお茶を淹れる。袋の裏は読まない。今さら始める必要はない。

choices:
  - text: |-
      お茶を淹れる
    next: act3/act3_confront_morning
