id: act3/act3_embrace_entry

text:
  - |-
    車には向かわない。
  - |-
    入口をくぐって、廊下に座り込む——床に直接、バッグを隣に置いて。劇的なことは何もない。ただ、今これが一番自然なことに思える。
  - |-
    ナレーターは、今度は少し違う場所から話す——何をするかではなく、何がわかったか。
  - |-
    家族のことを知らなかった。家は見知らぬ場所だった。でも、準備されていた——誰かのために、特定の誰かのために。その誰かは自分だということが、今はわかる。これが超自然的に何を意味するのか、言葉にできない。言葉にしようとしない。
  - japanese_female_adult_japanese_cheerful_clear: |-
      ああ。だからここに来たんだ。
  - |-
    相続のことではない。それより前のことだ。家は、人が腰を落ち着けたときに立てる音を立てる。

choices:
  - text: |-
      座っている
