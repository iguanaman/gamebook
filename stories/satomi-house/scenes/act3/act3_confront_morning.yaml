id: act3/act3_confront_morning

text:
  - |-
    夜明けだ。一晩中起きていた。庭でお茶を持って座っている——雑草は相変わらず伸び放題で、廊下は相変わらず寸法が合っていない。三時に巻き尺で測り直した。やはり合っていない。でも、家は静かだ。来てから初めての静けさだ。
  - if: {flags: [confront_undo]}
    text: |-
      ここにいたものは、今はどこかよそにある。それがよいことかどうかは、わからない。
    else: |-
      ここにいたものは、長い間何かを待っていた。それが届いた。
  - if: {stats: {composure: 7}}
    text: |-
      想像していたよりずっと整った気持ちでいる。この電話を受け取れる。
    else: |-
      庭が落ち着かない——お茶だけが、今のところ確かなものだ。
  - |-
    スマートフォンを確認する。
  - if: {flags: [called_ryan]}
    text: |-
      不在着信が二件。午前六時と、六時十四分。ボイスメールが届いたのは夜中の二時——それでも折り返してきた。そういう人だ。ナレーターはその点を記録しておく。
    else: |-
      ライアンからメッセージがある。「連絡して。心配してる。」六時二十分送信。
  - |-
    フライトには乗り遅れた。それでいい。
  - |-
    ライアンに電話する。三回コールで出る。

choices:
  - text: |-
      全部話す
    next: act3/act3_confront_ending

  - text: |-
      何も話さない——「思ったより時間がかかった」
    next: act3/act3_confront_ending

  - text: |-
      廊下のことだけ話す
    next: act3/act3_confront_ending
