journal: You took the water with the bite already counting.
text:
- The bite-arm is colder than the water and hotter than the water and it is doing
  neither of the things an arm does in a swim.
- Your body knew before you knew. The marina was not the place to argue with it. The
  river is not the place to argue with it.
- The far bank does not arrive. The river closes over.
