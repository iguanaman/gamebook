journal: |-
  You waited. The marina did not.

text:
  - |-
    The apron took them in stages — the back, then the office, then the floating dock, then the cruiser's slip. Vance was gone before the dock-side bollard fell. Marrow was gone with her, on the cruiser, with the pole still in her hand.
  - |-
    You were in the middle of the apron the whole time, choosing.
  - |-
    The wait-it-out was a thing the radio loop tried to teach you about, on the first day. You did not learn it then either.
  - |-
    The dead reach the place you are standing. They are slow. They have been slow the whole time. They did not need to be fast.

