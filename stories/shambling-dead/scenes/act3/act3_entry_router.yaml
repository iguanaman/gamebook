text:
- 'The arterial ends at a chain-link gate. Beyond it: a concrete apron, three pontoons,
  the river running grey and open. The dead are still behind you — the chord that
  has been at your back since the cul-de-sac has caught up by attrition and is closer
  than it has been all day. Across the marina, on the far concrete jetty, a smaller
  group works its slow way down a parked-up jet ski.'
- The river is loud. The river is the first open sound you have heard since the lawn.
