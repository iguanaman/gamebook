text:
- The river takes the boat. Or it takes the kayak. Or it does not take you. Whichever
  way the math came out, the marina is behind you now, the way a bad year is behind
  a person — present in the body, gone from the frame.
- The light has thinned. The chord at the receding shore is still the chord. There
  is one breath left to take before the run names what it was.
