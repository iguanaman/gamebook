      bitten_dock_hold: true
- text: Tell them to go on the boat. Hold the dock yourself.
  next: act3/hold_the_dock_bitten
  requires:
    flags:
    - stranger_alive
    stats:
      bond: 4
    flags_unset:
    - child_rescued
