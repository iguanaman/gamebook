text:
  - |-
    The alley between the third block and the fourth runs blind for fifty metres — dumpsters, a chain-link, a turn at the end you cannot see past. The doors on either side are fire exits. They do not open from out here.
  - |-
    You take it because the alternative is the road, and the road has more eyes on it.

choices:
