text:
- The side stair drops to a service road that runs blind for a stretch — fence on
  one side, the slope of the underpass on the other. You cannot see what is on it
  until you are on it.
- The chord is louder down here, or quieter. You cannot tell which. Both, maybe.
choices:
- text: Take the service road.
