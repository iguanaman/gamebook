text:
  - |-
    The revolving door is wedged. You go around it, through the gap where the coat is. The lobby smells worse inside than out.
  - |-
    The reception desk is to your left. There were three of them in the lobby. There are more than three. The dark, the way the dark moves — you had seen it from the street and gone in anyway.
  - |-
    Above you, four floors up, the crying stops. Not because anybody got there.
  - |-
    The lobby was visibly compromised. You saw it and went in.

