text:
- You did not have the gun. You did not have the body. The room had three of them
  and you knew it before the door moved.
- The first one is on you in the second aisle. You get a hand up. The hand does not
  help. The shelves come down with you, and there is a long second where you are looking
  at a strip-light on the ceiling and listening to the second one come around the
  end of the aisle. You did not need bandages this badly.
- The flee option had been at the top of the list.
- '*The scene told you to flee. You didn''t.*'
- '*— Death ending D6 — Pharmacy bite —*'
