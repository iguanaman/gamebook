text:
- You move on the wire. Hand on the post, weight forward. He was not a hostile man.
  He was a frightened one. You had read the wrong word.
- The shot is small. The radio loop does not stop for it. The same three words come
  round again.
- male_young_american_forthright: Show your hands. Do not approach the wire. We are
    not autho —
- male_young_american_forthright: I'm sorry. I'm sorry. I'm sorry.
- Three words off the list. The only ones he had left.
- You mistook fear for hostility. The loop kept saying it. You did not listen.
