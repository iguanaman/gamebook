text:
- You moved first. You moved first against three of them, in a place they had built
  and you had not, with a body that has been on the road for two days and hands that
  have not held a fight before this one.
- Hollis gets a hand on your wrist before you get a hand on him. The lieutenant is
  behind you in the time it takes to turn your head. Reece — for a second — looks
  like he might step in. Reece does not step in.
- The pot rocks on the grate.
- '*You fought a stronger group with insufficient resources.*'
- '*— Death ending D5 — Fought thin —*'
