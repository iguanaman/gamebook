text:
- You pick the line and you push. Speed should have been enough. Speed was a thing
  your body had three days ago.
- The pistol works once, twice. The third pull is a hand on the slide that is not
  yours. Your knees were not under you. You knew they were not. You went anyway.
- You knew you were thin. The water said so. Your body said so. You did not listen.
- The chord above the grates does not change for it. The city does not notice.
