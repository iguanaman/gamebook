text:
- The rung is nine feet up. The wall under it is brick to waist height and then panel
  — nothing to set a foot on. You will be off the ground for the first reach, and
  the first reach is the one that matters.
- The crying continues. The lobby groan, around the corner, is louder than it was
  two minutes ago. Something inside has heard you, or has heard the crying, or has
  heard nothing at all and is just moving the way it moves.
choices:
