text:
  - |-
    The arterial spills onto the river road. North and east. Downstream is the marina. The chord of the city is at your back, working through the streets you came down. The wind is off the water and it is colder than the streets were.
  - |-
    You take the next step.

choices:
  # ε — Mara + one adult, bond and supplies earned, no betrayal posture
  - text: |-
      The river road.
    next: act2/exit_epsilon_mara_plus_one
    requires:
      flags: [child_rescued, teen_alive, shared_supplies]
      flags_unset: [elder_alive, stranger_alive, killed_survivor, abandoned_wounded]
      stats:
        bond: 4
    hide_if_failed: true
