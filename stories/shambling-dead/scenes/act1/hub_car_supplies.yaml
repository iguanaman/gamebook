text:
  - |-
    Glove box: a half-empty bottle of water, a packet of paracetamol with two left, a granola bar gone soft in the heat. Under the passenger seat, a torch with batteries that still work.
  - |-
    You pocket what fits. The car was somebody's small life thirty minutes ago. You don't think about it.

choices:
