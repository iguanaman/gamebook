id: start_with_lantern
blocks:
  - "You hold out five gold coins. The merchant plucks them from your palm."
  - text: "There you are. Stays lit in rain too, if you angle it right. Safe roads."
    voice: male
  - |
    He passes you a battered tin lantern. Its flame catches immediately. He turns back to his fire without another word.

    The crossroads waits.
choices:
  - text: Take the road to the forest
    next: path_a
  - text: Take the road to the village
    next: path_b
