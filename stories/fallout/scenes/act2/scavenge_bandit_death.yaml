id: act2/scavenge_bandit_death
text:
- |-
  You break the man's wrist over the lip of the van. You take his pipe. You drive him back into the rags he came out of and you stand there a long second with your chest heaving and the wasteland tilting at the edges of your vision and the metallic taste in your mouth gone hot and copper.
- |-
  You start back to the diner.
- |-
  You don't make it.
- |-
  The cough takes you a hundred metres out, and the next cough doubles you over, and the third cough you don't quite get up from. The road is warm under your cheek. The sun is in the sky. You think — without urgency, without surprise — *Reyes was right. I should have let her treat me.* And then there is no thinking. And then there is no road.
