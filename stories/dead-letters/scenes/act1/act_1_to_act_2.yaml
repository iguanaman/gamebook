id: act1/act_1_to_act_2
text:
- I broke the seal on the envelope. The bills smelled of the kitchen drawer she'd
  kept them in. I counted them once and then I didn't count them again.
- 'What I had: the slip with ALDWICK on it. A name a clerk on a stairwell had been
  brave enough to write down and not brave enough to say out loud. A neighbourhood
  I had never set foot in and a husband I had never met and a client three nights
  in the ground.'
- What I'd brought back from the rest of it — the key, the frame, the friends, the
  men who knew my face now — I would carry into the morning the way a man carries
  a bag he packed in a hurry. Some of it would matter. Some of it I'd find out later
  I should have left.
- The streetcar to Aldwick ran east at six. I had until then to sleep, and I wouldn't.
journal: 'Three nights after the funeral, you opened the retainer envelope. Whatever
  Vera Doss died for, you''d find it or you wouldn''t. The streetcar ran east at six.

  '
