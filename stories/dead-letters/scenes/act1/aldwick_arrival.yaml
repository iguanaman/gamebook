id: act1/aldwick_arrival
journal: You followed Ray's movements to Aldwick. The neighbourhood knew it was being
  watched.
text:
- Aldwick is the kind of neighbourhood that knows when it's being looked at. Working-class,
  close-knit — houses pressed shoulder to shoulder, front stoops worn soft. Frank
  parks a block away from habit.
- Three city survey vehicles are parked in a row on the east end. Fresh chalk marks
  on the kerb. Nobody's talking to the crews.
- if: visited
  text: The neighbourhood reads him differently now. A few faces. Not friendly, not
    hostile — the specific watchfulness of people who've learned to mark who comes
    back.
choices:
- text: Walk the streets — get the feel of the place before you knock on anything
  next: act1/aldwick_street_read
  effects:
    flags:
      aldwick_visited: true
- text: Find someone who looks like they've been here long enough to know things
  next: act1/aldwick_elder_approach
  effects:
    flags:
      aldwick_visited: true
- text: Check the buildings against the parcel number you found — let the paperwork
    lead you
  next: act1/aldwick_parcel_check
  effects:
    flags:
      aldwick_visited: true
    stats:
      evidence: 1
