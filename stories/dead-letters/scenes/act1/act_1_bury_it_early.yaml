id: act1/act_1_bury_it_early

text:
  - |-
    I put the envelope in the drawer. I closed the drawer. The drawer closed the way a drawer does — without ceremony, without comment, without complaint.
  - |-
    I poured a drink and I drank it and then I poured another and I didn't drink that one. The lamp burned down. The street outside got quieter and then it got quiet.
  - |-
    A year went by the way years do in a city — fast in the daylight, slow at three in the morning. I took other cases. I paid the gas bill. I learned not to think about Tuesday afternoons.
  - |-
    A bar uptown, late spring. A man at the next table was telling a man across from him about a highway the federal government had finally put on the calendar. The route was going through somewhere called Aldwick. The man across from him made a joke about how nobody who lived there was going to miss it.
  - |-
    I looked up. The man caught my eye for half a second and looked away again the way men do in bars when they think they've been overheard. I looked down. I had a drink in front of me I had not yet started.
  - |-
    I started it.
  - |-
    The story ends here. It would have ended here for Vera Doss too, if I had been paying attention. As it is, it only ended here for me.

journal: |
  You walked away. A year later, in a bar uptown, you heard the name Aldwick from the next table over and you looked down at your drink and you kept looking down. The story you didn't tell yourself is the one nobody told.

