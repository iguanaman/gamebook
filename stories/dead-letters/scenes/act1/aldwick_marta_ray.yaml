id: act1/aldwick_marta_ray
text:
- Marta steps back and lets him in. The kitchen table has a notebook on it — she doesn't
  close it, but she doesn't offer it either.
- female_midlife_african-american_casual_opinionated: I knew Ray. He came here three
    times. First time I thought he was like the others — write it down, confirm the
    number, go home. Second time he came back on his own. No clipboard.
- She sits down but doesn't gesture at another chair.
- female_midlife_african-american_casual_opinionated: Last time he was here he said
    he'd found something big enough that he didn't want to write it down in the office.
    He was going to copy the documents — the real ones, the originals — and get them
    to the state auditor. That was six weeks ago. I haven't heard from him since.
- She says it without looking away.
- female_midlife_african-american_casual_opinionated: I don't know if he made it to
    the auditor.
choices:
- text: Ask if Ray left anything with her — documents, a location
