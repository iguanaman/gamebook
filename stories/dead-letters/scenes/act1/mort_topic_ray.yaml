id: act1/mort_topic_ray

text:
  - male_elder_american_wise_approachable: |-
      Doss. Surveyor. Quiet fellow. [chuckle] You know a contractor lost the Aldwick paving job last spring? Came in lowest by a country mile. Lost it anyway.
  - |-
    He swirled his glass and watched the light through it.
  - male_elder_american_wise_approachable: |-
      Won by a fellow whose brother runs a bank. Funny old town, kid. Funny old paperwork.
  - |-
    He grinned at me like a man who had just dropped a coin in a jar to see if I noticed it land.

