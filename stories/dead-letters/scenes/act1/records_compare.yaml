id: act1/records_compare
text:
- Old boundary. New boundary. Frank puts them side by side.
- The parcels haven't been corrected. They've been moved. Not one or two — a dozen
  of them, stepping east in sequence, like a hand pushing chips across a table. The
  pattern starts from a point about three blocks into Aldwick and moves outward. Everything
  east of that line has changed title in the past eighteen months.
- Frank doesn't know what's going in on the far east side of the corridor. Not yet.
  But he knows the direction the money is moving, and he knows it isn't accidental.
choices:
- text: Copy the key parcel numbers — this is the map of the conspiracy
  next: act1/beat3_exit
