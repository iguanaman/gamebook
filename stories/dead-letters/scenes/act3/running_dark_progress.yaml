id: act3/running_dark_progress

text:
  - |-
    Frank stops in the stairwell of a building he doesn't know, three floors up, and listens. Nothing following. The city keeps its own noise — a truck, a radio from somewhere, someone's argument two floors below. Nothing that's looking for him.
  - |-
    He has the ledger. He has whatever else he found or didn't find. He has maybe nine hours before Kellner's net hardens from a search to a certainty.
  - |-
    The question now is what to do with it.

choices:
  - text: |-
      Find a phone — check if Dora Reyes is reachable before the net closes.
    next: act3/running_contact_dora
    requires:
      flags:
        - found_ledger
      flags_unset:
        - left_package
    hide_if_failed: true

  - text: |-
      Keep moving toward the last angle — figure out what you have and what it means before you do anything with it.
    next: act3/beat3_last_angle
