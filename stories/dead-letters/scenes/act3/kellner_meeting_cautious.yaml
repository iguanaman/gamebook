id: act3/kellner_meeting_cautious

text:
  - |-
    You came in through the side entrance. Noted the booth by the door before you crossed the room. Kellner is already seated and his coffee is untouched. His hands are visible on the table — the discipline of a man who knows what hands in pockets mean.
  - male_midlife_american_rich_smooth_rugged: |-
      Frank. There he is. Sit down — I was starting to think you'd changed your mind.
  - |-
    He registered it. Something behind the warmth tightened when he saw you come in from the side. He adjusted — the smile held, the posture opened, the words came out right. You watched him do it.

choices:
  - text: |-
      Let him make his pitch. You can read a pitch without believing it.
    next: act3/kellner_meeting_surface

  - text: |-
      Read the tells. What does a man who's running you look like from the inside?
    next: act3/kellner_meeting_read

  - text: |-
      Name it. "You've been managing me since the first phone call."
    next: act3/kellner_meeting_direct
