id: act3/lose_tail
text:
- Three turns in two blocks. A streetcar on Banner I had not taken since the war and
  could not have said why I knew its schedule. The sedan stayed with me through the
  first turn and the second.
- The third turn was the one. The third turn was the one I had been doing it all for.
