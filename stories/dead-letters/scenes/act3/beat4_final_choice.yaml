id: act3/beat4_final_choice
text:
- if:
    flags:
    - left_package
    stats:
      heat: 7
  text: He doesn't make it to the choice. A car pulls alongside him on Marsh Street
    — not fast, nothing obvious — and two men he's never met close the distance before
    he can measure it. Kellner doesn't need to be here for this part.
- if:
    flags:
    - left_package
    stats:
      heat: 7
  else: Frank stands on the corner of Trumbull and Sixth and the city goes on around
    him. A man buying cigarettes. A woman hailing a cab. The ordinary apparatus of
    a Tuesday evening in Harmon City.
- if:
    flags:
    - left_package
    stats:
      heat: 7
  else: He has what he has. He knows what the city is. He knows what the ledger would
    do if it got to the right desk. He knows what it costs to carry it the last step,
    and he knows what it costs not to.
choices:
- text: The package is already in transit. It doesn't matter what happens now.
  next: act3/ending_martyr
  requires:
    flags:
    - left_package
    stats:
      heat: 7
  hide_if_failed: true
- text: Go to Dora Reyes — take the ledger to the Tribune and put it on her desk.
  next: act3/ending_expose_approach
  requires:
    stats:
      evidence: 6
  failed_text: '*(You don''t have enough to make it stick. A story needs facts, not
    a pattern.)*'
- text: Walk away — burn the copies, put the ledger somewhere it will never be found,
    leave Harmon City tonight.
  next: act3/ending_bury_choice
