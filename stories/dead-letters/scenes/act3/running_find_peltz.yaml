id: act3/running_find_peltz
text:
- The bar three blocks from the surveying department. Frank has been here once before
  — he knows the stool Peltz uses because it's the one closest to the back wall and
  farthest from the door.
- Peltz is on it.
- He's on his second glass by the look of it, staring at the middle distance the way
  a man does when he's been practising something unpleasant. When Frank sits down
  next to him, the colour goes out of his face.
- male_young_american_weak: I knew you'd come back.
choices:
- text: Sit with it — let Peltz's fear do the opening for you.
  next: act3/peltz_act3_silent
- text: Tell him Frank is going to expose it — he needs to know it's happening, whether
    or not he helps.
  next: act3/peltz_act3_direct
- text: Tell him you just need one thing — what was in the file he saw Ray take home?
  next: act3/peltz_act3_specific
