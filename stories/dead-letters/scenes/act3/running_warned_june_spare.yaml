id: act3/running_warned_june_spare
text:
- Frank gives her the minimum. Three names she shouldn't trust. Two blocks she shouldn't
  be on this week. The window of time before it stops being a warning and starts being
  a fact.
- June nods at each one like a woman crossing items off a list she already started.
- female_adult_american_droll_wry_dry: I've been doing a version of this for two years.
- Then she asks the one question she's been holding since the first time Frank stood
  in her doorway.
- female_adult_american_droll_wry_dry: Is the man who did this going to answer for
    it?
- Frank doesn't lie to her.
choices:
- text: Leave — you've given her what she needs.
  next: act3/running_dark_progress
