id: act3/kellner_escape_resolve
text:
- if:
    stats:
      heat: 8
  text: The second man was already inside. The kitchen door was already covered before
    you stood up. You understood this a second too late — and a second was all it
    cost.
- if:
    stats:
      heat: 8
  else: You make it through the kitchen. The line cook doesn't look up. The alley
    exit is clear. Cold air hits and you keep moving, coat collar up, three blocks
    before you let yourself breathe.
choices:
- text: There is nowhere left to go.
  next: act3/ending_pavement
  requires:
    stats:
      heat: 8
  hide_if_failed: true
- text: Keep moving. You're out.
  next: act3/act3_running
