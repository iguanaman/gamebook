id: act3/ending_bury_late_with_evidence
text:
- if:
    flags_unset:
    - frank_burned_paper
  text: The sink was porcelain and old and stained the colour of weak tea around the
    drain. The book went in face down. I struck the match on the side of the box the
    way Walt had taught me to strike a match, twenty years ago, on a stakeout in a
    doorway on Henning Street. The flame took at the corner of the page where Halston
    Thorne's name was written in Ray Doss's hand and worked inward.
  else: The photographs went in. Negatives on top of prints. The match took at the
    corner of the topmost negative and the celluloid curled the way celluloid curls.
    The book stayed on the desk. I would not burn the book. I would put it in the
    drawer and lock the drawer and never open it again, which was a thing I could
    tell myself was different from burning it and was not.
- The page numbers charred. The binding came apart. I ran the tap and the ash went
  down the drain in a slow grey spiral and I stood at the sink and watched it the
  way a man watches a thing he has done that he cannot undo, which is most of what
  watching is for at four in the morning.
- A train ticket to Sacramento at the counter at Union Station. Cash, not the cheque.
  The clerk did not look up. I caught the six fifteen and slept in the seat with my
  coat over me and woke up at a station I did not know the name of in a part of the
  state where the air smelled of grass instead of oil.
- A year later. A diner counter in a town outside Sacramento. The waitress called
  me Mr. Cady because I had told her my name once and she had remembered it, which
  is what waitresses in towns outside Sacramento do.
- The paper folded on the counter beside the coffee. *Halston Thorne, of the Riverdale
  Thornes, named yesterday to the board of the Pacific Federal Bank in New York.*
  Three column inches. A photograph of him on the steps of a building. The same suit.
  The same tan. The signet ring on the little finger of the left hand.
- if:
    flags:
    - mort_knows_full
  text: Mort Halloran's byline on the *Examiner*'s second page. A piece about a city
    alderman's daughter. He had filed the piece I had not let him file and was filing
    what he could file instead. He was good at it. He had always been good at it.
- if:
    flags:
    - said_goodbye_aldwick
  text: A letter at the Sacramento PO box from Marta Gaines. Three lines. *The highway
    came through. Reuben took the offer for the porch. He is in Detroit now with our
    cousin. I am writing because I said I would.* No return address. She had not wanted
    me to write back. I did not write back.
- if:
    flags:
    - kellner_admitted
  text: Walt Kellner's name was not in the paper. He had retired at full pension six
    months ago, the small notice on page nine had said, with thanks from the department
    for thirty years of distinguished service. He had named Salzano in a room on a
    riverbank and the city had let him take his pension and go.
- Vera Doss's photograph in my wallet. I took it out of the wallet at the counter
  and put it on the formica beside the coffee cup. The waitress did not ask. I drank
  the coffee. I put the photograph back. I ordered another coffee.
journal: You knew. You walked. The book burned. A year later you read about Halston
  Thorne's promotion at a diner counter and ordered another coffee.
choices: []
