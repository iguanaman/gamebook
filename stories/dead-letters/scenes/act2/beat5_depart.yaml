id: act2/beat5_depart
text:
- Frank stands on Trumbull Street with the ledger under his arm. The late afternoon
  is quiet — but not right. A car was parked at the north end when he arrived. It
  isn't there now. A different one is. Someone has been watching this building.
- Two blocks west, there's a post office still open.
choices:
- text: Mail a copy of the key pages to Dora Reyes at the Tribune — she'll know what
    to do with it
  next: act2/mail_package
  requires:
    flags_unset:
    - left_package
  hide_if_failed: true
- text: Don't mail anything yet — take the ledger to the office and think
  next: act2/office_hub_act2
