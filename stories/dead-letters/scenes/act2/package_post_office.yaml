id: act2/package_post_office

text:
  - |-
    Six in the evening. The post office on Tenth, the one open until seven, the one with the brass scales worn smooth and a tin ceiling that hummed when the trolleys went by.
  - |-
    Hettie Voorhees behind the counter. Spectacles on a beaded chain. The rubber thumb-stall on her right hand she sometimes remembered to take off and sometimes did not.
  - |-
    The parcel was already wrapped — brown paper, twine, the handcopy or two photographs or two torn pages folded inside it depending on what the week had given me. Already addressed, in my own hand, in pencil so I could change my mind.
  - |-
    Across the street a man was reading a paper he was not turning. He had been there a quarter of an hour. He was not pretending well.
  - female_elder_american_relatable_likeable: |-
      Help you, dear?

choices:
  # Mail (plain) — four hidden variants, one per address source. Only one shows.
  - text: |-
      Hand over the parcel. Pay for the postage. Walk out the back way.
    next: act2/package_mailed
    requires:
      flags_unset: [left_package]
      flags: [dora_address_known]
    effects:
      flags:
        left_package: true
    hide_if_failed: true
  - text: |-
      Hand over the parcel. Pay for the postage. Walk out the back way.
    next: act2/package_mailed
    requires:
      flags_unset: [left_package, dora_address_known]
      flags: [mort_owes_one]
    effects:
      flags:
        left_package: true
    hide_if_failed: true
  - text: |-
      Hand over the parcel. Pay for the postage. Walk out the back way.
    next: act2/package_mailed
    requires:
      flags_unset: [left_package, dora_address_known, mort_owes_one]
      flags: [marta_warned]
    effects:
      flags:
        left_package: true
    hide_if_failed: true
  - text: |-
      Hand over the parcel. Pay for the postage. Walk out the back way.
    next: act2/package_mailed
    requires:
      flags_unset: [left_package, dora_address_known, mort_owes_one, marta_warned]
      flags: [mort_writes_anyway]
    effects:
      flags:
        left_package: true
    hide_if_failed: true

