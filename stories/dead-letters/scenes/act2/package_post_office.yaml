  # No address path — only when none of the four flags is set
  - text: |-
      Stand at the counter with no address to put on it.
    next: act2/package_no_address
    requires:
      flags_unset: [left_package, dora_address_known, mort_owes_one, marta_warned, mort_writes_anyway]
    hide_if_failed: true

  # Walk out without mailing — re-attemptable once
  - text: |-
      Walk out without mailing it. The man across the street is too close.
    next: act2/package_aborted
    requires:
      flags_unset: [left_package]
    effects:
      flags:
        package_aborted_once: true

  # Hard refusal — locks Martyr
  - text: |-
      Walk out without mailing it. You'll never mail it. The Martyr ending is locked.
    next: act2/office_hub
    effects:
      flags:
        left_package_refused: true
