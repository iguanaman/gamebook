id: act2/marta_act2_approach
text:
- Craddock put in the word. Marta Gaines answers the door before Frank finishes knocking
  — she was expecting him. She looks at him the way a woman looks at a man she's been
  told she can trust but hasn't decided yet.
- She's holding a notebook. Doesn't offer it.
choices:
- text: Tell her everything you know — she's been tracking this longer than you have
  next: act2/marta_act2_full
  requires:
    stats:
      rep: 5
  failed_text: '*(She''d hear it as a test. You don''t have the standing yet.)*'
  effects:
    flags:
      marta_talked: true
- text: Show her what you have — the parcel numbers, the holding company name
  next: act2/marta_act2_partial
  requires:
    stats:
      rep: 3
  failed_text: '*(She''d close the door. You haven''t earned enough trust in this
    neighbourhood.)*'
  effects:
    flags:
      marta_talked: true
- text: Knock anyway — take the chance
  next: act2/marta_closed
- text: Go back — spend more time in Aldwick first
  next: act2/aldwick_hub
