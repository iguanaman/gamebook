id: act2/cold_trail_radar
text:
- A week passed the way the bad ones do. The card Brennan's people had slid under
  my door three nights ago was still on the desk where I'd dropped it, and the slip
  with ALDWICK on it was still under the desk lamp.
- The city had not forgotten me. Halfway up the stairs that morning, I found out it
  had sent somebody to remind me.
