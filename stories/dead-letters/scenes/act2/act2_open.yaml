id: act2/act2_open
text:
- Vera Doss is dead. Ray Doss is still missing. Frank has a parcel number, a holding
  company name no one around here seems to recognise, and a boundary survey that was
  re-filed twice in fourteen months.
- This was a missing persons case. It isn't that anymore.
- Three threads to pull. The question is which one breaks first.
choices:
- text: Go to the city records office — the boundary re-filings are the thread, pull
    it
  next: act2/records_office_return
- text: Read back through what Vera gave you — her file was the only lead she died
    with
  next: act2/vera_file_review
  requires:
    flags:
    - met_vera
  hide_if_failed: true
- text: Go to Aldwick first — the paperwork will confirm what the neighbourhood already
    knows
  next: act2/aldwick_hub
  requires:
    flags:
    - aldwick_visited
  failed_text: '*(You''d be walking in cold. The records first.)*'
