id: act2/act_2_bury_it_late

text:
  - |-
    Four in the morning. The lamp off and then on again because the dark was a thing I had not earned yet. The drawer pulled open. Vera's retainer envelope where it had been for a month, her name on it in the careful hand she had used the morning she sat across from me and turned the gold band on her finger and called me Mr. Cady.
  - |-
    The ledger went on top of the envelope. Or the photographs. Or the two torn pages folded in newsprint. Or my hand on the empty wood at the bottom of the drawer, because there had not been enough to bring back and I had known that when I had not gone to the warehouse.
  - |-
    The lock turned. The lamp went off. The phone rang at half past four and I sat in the chair and listened to it ring and did not pick it up. It rang seven times and stopped. It rang twice more an hour later. By the second time I had stopped counting.
  - |-
    Months. A highway through where Marta's kitchen had been. A piece in the *Examiner* about the Mayor's brother and a board seat at a New York bank, not connected to the highway in the writing of it because the writing of it was not the kind of writing that connected things.
  - |-
    A diner counter on Henning Street where Walt Kellner and I used to take the three a.m. shift. Coffee and the paper. The waitress called me Mr. Cady the way Hettie at the post office had called every customer dear. She meant nothing by it. That was the part that took longest to get used to.

journal: |-
  You did not pick up the phone the second time it rang. The drawer locked over Vera's envelope and what was in it. Months later a highway ran through Aldwick. You read about it at a diner counter and ordered another coffee.

