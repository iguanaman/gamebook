id: act2/act_2_bury_it_early

text:
  - |-
    I handed him the file. He took it without looking at it. He stepped aside the way a man steps aside who has been told the way the corridor goes and has decided the corridor goes that way for him too.
  - |-
    The front door of the City Engineer's building opened from the inside without a key. I had not known that. I knew it now.
  - |-
    The train at six in the morning. A bag I had packed in twenty minutes from a flat I had lived in for nine years. San Diego in the third week. The flat above the shipping office had a window that faced a side street with a palm tree at the end of it that did not belong on that street.
  - |-
    Three months later a wire piece in the *Union* about a federal highway going through a neighbourhood in a city I had decided to stop reading about. I read the piece. I did not write a letter to the editor.
  - |-
    The clerk in the shipping office called me Mr. Cady the way Salzano had called me Mr. Cady. He meant nothing by it. That was the part that took longest to get used to.

journal: |-
  You handed Salzano the file in the corridor of the City Engineer's building. You took the train in the morning. The flat above the shipping office had a palm tree at the end of the side street that did not belong on the street.

