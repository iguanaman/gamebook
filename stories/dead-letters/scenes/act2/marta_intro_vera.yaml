id: act2/marta_intro_vera

text:
  - |-
    I said Vera's name. The room stopped. Marta stopped.
  - female_midlife_african-american_casual_opinionated: |-
      Vera Doss. She came to a meeting in March. Sat where you're standing.
  - |-
    She said it without softening. The pencil came down on the lectern and stayed there.
  - female_midlife_african-american_casual_opinionated: |-
      Two doors down. Blue step. After the meeting. Don't be late, Mr. Cady. I don't pour twice.

choices:
