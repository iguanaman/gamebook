id: act2/squeeze_lethal

text:
  - |-
    The drawer was where it had always been. The gun was where it had always been. I had it out and level before he had finished setting his hat down.
  - |-
    His two men shot first. They had been standing at the door for that, and they had been good at it for longer than I had been good at this. The first round took me in the chest. The second was insurance.
  - male_midlife_british_dark_seductive_deep: |-
      A pity, Mr. Cady. We had a flat for you in San Diego.
  - |-
    The brick on the floor was the last thing I looked at. It was nearer than the ceiling and the ceiling was already further than it had been a moment before. I did not hear the door close. I did not hear the men leave.
  - |-
    The city closed the file in person. A drowning, the *Examiner* would say in two paragraphs on Thursday, in a man whose office was on the third floor and whose chair was now empty. The retainer envelope in the drawer they would not bother to open.

