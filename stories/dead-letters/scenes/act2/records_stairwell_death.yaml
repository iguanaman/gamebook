id: act2/records_stairwell_death
text:
- Salzano on the landing above. The second man on the landing below. I had taken the
  stair in the wrong direction and the building had known I was going to.
- There was no version of the next thirty seconds that ended with me on the lobby
  floor. There was a version that ended with me on the half-landing between floors
  with the boundary maps under my back and a hand at my collar that did not need to
  be a fist.
- My last thought was that Voss had polished the lenses of his half-moon spectacles
  every time he had lied to me, and he had polished them for nothing.
journal: You went into a building that knew you were coming and you took too much,
  too late. Salzano did not raise his voice. He did not need to.
