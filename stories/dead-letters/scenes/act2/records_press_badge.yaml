id: act2/records_press_badge
text:
- The bell pull. The janitor in the gap. I held the badge up where the light could
  find it. Mort's name embossed across the bottom in letters worn soft by his thumb.
- He read it once. He read it twice. He gave a short nod that was not for me.
- male_midlife_british_tough_calloused: Mort's boy. Third floor. Last office.
- He let the door swing wide. Watched me go up. The racing form was open on a stool
  by his elbow before my foot had found the second step.
choices:
- text: Continue to the records corridor.
