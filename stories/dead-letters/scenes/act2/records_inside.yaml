id: act2/records_inside
text:
- The records room. Cabinets along three walls, a green-shaded reading lamp on the
  corner desk, a brass desk lamp pulled out of true the way a man pulls a lamp who
  reads against deadlines. The smell was old paper and the man who handled it — pipe
  tobacco a year stale, ink, a faint wool of someone else's coat.
- Aldwick parcels, third cabinet, second drawer down. I had it open before I had decided
  I was going to. A locked drawer at the bottom of the cabinet I would not get into
  in the time I had. Fifteen minutes if Salzano stayed where he had been. Less if
  he didn't.
- On the corner desk a loose page in a hand I knew — Voss's, careful, mildly transatlantic
  in the way the loops sat. Three lines. I would not read them yet.
choices:
