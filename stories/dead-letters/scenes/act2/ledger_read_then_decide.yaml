  - text: |-
      Tear out the Kellner pages. Take only those. Leave the rest.
    next: act2/ledger_inspect_partial
    effects:
      flags:
        found_ledger: true
        kellner_in_ledger: true
        ledger_partial: true
      stats:
        evidence: 2
