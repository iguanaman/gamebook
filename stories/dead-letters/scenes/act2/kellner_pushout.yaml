id: act2/kellner_pushout
text:
- Frank asks it straight. Why was he pushed out.
- Kellner goes still. Just for a moment — a half-second where the warmth stops running
  and something careful looks out. Then it's gone and he's talking again, same voice,
  same register.
- male_midlife_american_rich_smooth_rugged: Politics, Frank. It's always politics.
    You made enemies above your pay grade. You always had a way of seeing things clearly
    and then saying them out loud, which is not always the same as being useful.
- He doesn't say which enemies. He doesn't say he was one of them. But Frank saw it
  — the half-second stillness. Kellner is not a man who goes still.
choices:
- text: Let it sit — you've seen enough
  next: act2/kellner_hub
  effects:
    flags:
      frank_past_revealed: true
- text: Push him — "You were involved, Walt"
  next: act2/kellner_pushout_confrontation
  effects:
    flags:
      frank_past_revealed: true
