id: act2/marta_act2_partial
text:
- She lets him in. Stands in the doorway to the kitchen — not fully in the room with
  him yet. He shows her the parcel numbers. She looks at them, then at him.
- female_midlife_african-american_casual_opinionated: Those match. Blocks three through
    seven on the south side — that's what Ray was resurveying. He was using one of
    the condemned buildings as a working space. South block. I don't know which one
    specifically. He didn't tell me and I didn't ask.
- She means it as a boundary. She gave him the blocks. The specific address she doesn't
  have, or isn't ready to say.
journal: Marta Gaines gave you the blocks Ray was working — south side, blocks three
  through seven. The specific building, she wouldn't say.
choices:
- text: Work the south block — check each condemned building yourself
  next: act2/trumbull_street_search
  effects:
    stats:
      evidence: 1
- text: Go to the records office — condemned building permits will narrow it down
  next: act2/trumbull_street_records
