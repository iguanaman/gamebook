# Scene template — copy to stories/{id}/scenes/{scene-id}.yaml
# Scenes can be organised into subfolders: scenes/act1/scene-id.yaml
# The scene ID then includes the subfolder: act1/scene-id
# Required: id, text, choices
# Optional: audio (set automatically by generate_audio.py)

id: scene_id          # if in a subfolder: act1/scene_id

# Simple form — narrator voice only
text: "Single block of narrative text. Blank lines become paragraph breaks."

# Multi-block form — use when voice changes are needed
# text:
#   - "Narrator text, uses default narrator voice."
#   - male1: "A character speaks."
#   - "Back to narrator."

# audio: audio/scene-id.wav   # set by generate_audio.py — do not edit manually

choices:
  - text: Choice the player will see
    next: target_scene_id

  # Choice with stat requirement
  - text: Choice requiring gold >= 5
    next: another_scene
    requires:
      stats:
        gold: 5
    effects:
      stats:
        gold: -5

  # Choice with flag requirement
  - text: Choice requiring a flag
    next: another_scene
    requires:
      flags:
        - flag_name

  # Choice that sets a flag
  - text: Choice that sets a flag
    next: another_scene
    effects:
      flags:
        flag_name: true

  # Consumable choice — appears once, gone after taken
  # The choice requires the flag to be unset; taking it sets the flag.
  # On any return visit the flag is set so the choice no longer appears.
  - text: Buy the last potion (3 gold)
    next: bought_potion
    requires:
      flags_unset: [potion_sold]
      stats:
        gold: 3
    effects:
      stats:
        gold: -3
      flags:
        potion_sold: true

  # Choice that greys out when failed (shows failure flavour text)
  - text: Climb the wall
    next: rooftop
    requires:
      stats:
        agility: 8
    failed_text: "*(Your legs won't carry you that high)*"

  # Choice that stays hidden when failed (original behaviour — use for spoiler gates)
  - text: Speak the old tongue
    next: inner_sanctum
    requires:
      flags:
        - knows_elvish
    hide_if_failed: true

# Empty choices list = end-of-story screen
# choices: []
