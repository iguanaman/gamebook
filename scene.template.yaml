# Scene template — copy to stories/{id}/scenes/{scene-id}.yaml
# Scenes can be organised into subfolders: scenes/act1/scene-id.yaml
# The scene ID then includes the subfolder: act1/scene-id
# Required: id, text, choices
# Optional: audio (set automatically by generate_audio.py)

id: scene_id          # if in a subfolder: act1/scene_id

# Simple form — narrator voice only
text: "Single block of narrative text. Blank lines become paragraph breaks."

# Multi-block form — use when voice changes are needed
# text:
#   - "Narrator text, uses default narrator voice."
#   - text: "A character speaks."
#     voice: male
#   - "Back to narrator."

# audio: audio/scene-id.wav   # set by generate_audio.py — do not edit manually

choices:
  - text: Choice the player will see
    next: target_scene_id

  # Choice with stat requirement
  - text: Choice requiring gold >= 5
    next: another_scene
    requires:
      stats:
        gold: 5
    effects:
      stats:
        gold: -5

  # Choice with flag requirement
  - text: Choice requiring a flag
    next: another_scene
    requires:
      flags:
        - flag_name

  # Choice that sets a flag
  - text: Choice that sets a flag
    next: another_scene
    effects:
      flags:
        flag_name: true

# Empty choices list = end-of-story screen
# choices: []
