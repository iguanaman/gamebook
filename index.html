<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamebook</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
</head>
<body>
  <div id="frame"></div>
  <button id="fullscreen-btn" class="fullscreen-btn" title="Toggle fullscreen">⛶</button>

  <!-- text → arrow → button (top-right) -->
  <div id="hint-fullscreen" class="ui-hint ui-hint-top-right" data-hint="fullscreen">
    <span class="ui-hint-text">Click for a fullscreen experience!</span>
    <svg class="ui-hint-arrow" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="4" y1="24" x2="22" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="13,4 23,5 22,15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>

  <!-- arrow → text (top-left) -->
  <div id="hint-back" class="ui-hint ui-hint-top-left" data-hint="back">
    <svg class="ui-hint-arrow" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="24" y1="24" x2="6" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="15,4 5,5 6,15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="ui-hint-text">Return to the story menu</span>
  </div>

  <!-- arrow → text (bottom-left) -->
  <div id="hint-journal" class="ui-hint ui-hint-bottom-left" data-hint="journal">
    <svg class="ui-hint-arrow" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="24" y1="4" x2="6" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="15,24 5,23 6,13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="ui-hint-text">Track story notes in your journal</span>
  </div>

  <!-- text → arrow (bottom-right) -->
  <div id="hint-undo" class="ui-hint ui-hint-bottom-right" data-hint="undo">
    <span class="ui-hint-text">Made a bad choice? Undo it!</span>
    <svg class="ui-hint-arrow" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="4" y1="4" x2="22" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="13,24 23,23 22,13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>

  <button id="back-btn" class="back-btn back-hidden" aria-label="Back to story selection" title="Back to stories">⬅</button>
  <div id="app"></div>
  <button id="journal-toggle" class="journal-toggle journal-hidden" aria-label="Open journal" title="Journal">
    <span class="journal-icon" aria-hidden="true">✒</span>
    <span class="journal-dot" aria-hidden="true"></span>
  </button>
  <div class="journal-clip">
    <aside id="journal-panel" class="journal-panel journal-panel-closed" aria-hidden="true">
      <div class="journal-header">
        <h2 class="journal-title">Journal</h2>
      </div>
      <div id="journal-entries" class="journal-entries"></div>
      <div class="journal-footer">
        <button class="btn btn-ghost" id="journal-new-game">New Game</button>
        <button class="btn btn-ghost journal-quit" id="journal-quit">Back to Stories</button>
      </div>
    </aside>
  </div>
  <button id="hint-reset" class="hint-reset-btn" title="Reset hint progress">Reset hints</button>
  <script src="engine.js"></script>
</body>
</html>
