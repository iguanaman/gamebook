<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamebook</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
</head>
<body>
  <div id="frame"></div>
  <button id="fullscreen-btn" class="fullscreen-btn" title="Toggle fullscreen">⛶</button>
  <div id="hint-fullscreen" class="ui-hint ui-hint-top-right" data-hint="fullscreen">
    <span class="ui-hint-text">Click here for an immersive fullscreen experience!</span>
    <svg class="ui-hint-arrow ui-hint-arrow-up-right" viewBox="0 0 60 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 44 C10 20, 40 10, 54 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M54 6 L46 10 M54 6 L50 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <div id="hint-back" class="ui-hint ui-hint-top-left" data-hint="back">
    <svg class="ui-hint-arrow ui-hint-arrow-up-left" viewBox="0 0 60 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M56 44 C50 20, 20 10, 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M6 6 L14 10 M6 6 L10 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="ui-hint-text">Return to the story menu</span>
  </div>
  <div id="hint-journal" class="ui-hint ui-hint-bottom-left" data-hint="journal">
    <svg class="ui-hint-arrow ui-hint-arrow-down-left" viewBox="0 0 60 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M56 6 C50 30, 20 40, 6 44" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M6 44 L14 40 M6 44 L10 36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="ui-hint-text">Track story notes in your journal</span>
  </div>
  <div id="hint-undo" class="ui-hint ui-hint-bottom-right" data-hint="undo">
    <span class="ui-hint-text">Made a bad choice? Undo it!</span>
    <svg class="ui-hint-arrow ui-hint-arrow-down-right" viewBox="0 0 60 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 6 C10 30, 40 40, 54 44" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M54 44 L46 40 M54 44 L50 36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <button id="back-btn" class="back-btn back-hidden" aria-label="Back to story selection" title="Back to stories">⬅</button>
  <div id="app"></div>
  <button id="journal-toggle" class="journal-toggle journal-hidden" aria-label="Open journal" title="Journal">
    <span class="journal-icon" aria-hidden="true">✒</span>
    <span class="journal-dot" aria-hidden="true"></span>
  </button>
  <div class="journal-clip">
    <aside id="journal-panel" class="journal-panel journal-panel-closed" aria-hidden="true">
      <div class="journal-header">
        <h2 class="journal-title">Journal</h2>
      </div>
      <div id="journal-entries" class="journal-entries"></div>
      <div class="journal-footer">
        <button class="btn btn-ghost" id="journal-new-game">New Game</button>
        <button class="btn btn-ghost journal-quit" id="journal-quit">Back to Stories</button>
      </div>
    </aside>
  </div>
  <script src="engine.js"></script>
</body>
</html>
